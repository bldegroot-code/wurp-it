<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wurpen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:'Inter',sans-serif;color:#1a1a2e;
  background:linear-gradient(160deg,#1a8a3a 0%,#0d6b2a 50%,#0a5520 100%);
}
.page{max-width:480px;margin:0 auto;padding:1rem 1rem 3rem}

/* ── Panels ── */
.panel{
  background:#fff;border-radius:18px;
  padding:1.25rem;margin-bottom:.75rem;
  box-shadow:0 4px 16px rgba(0,0,0,.18),0 1px 0 rgba(255,255,255,.8) inset;
}
.panel-dark{
  background:rgba(0,0,0,.25);border-radius:18px;
  border:1px solid rgba(255,255,255,.15);
  padding:1.25rem;margin-bottom:.75rem;
}

/* ── Typography ── */
.game-title{
  font-family:'Nunito',sans-serif;font-size:52px;font-weight:900;
  letter-spacing:6px;text-align:center;color:#fff;
  text-shadow:0 3px 0 rgba(0,0,0,.3),0 0 30px rgba(255,220,0,.3);
}
.game-sub{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:2px;text-align:center;text-transform:uppercase;margin-top:2px}
.section-label{font-size:11px;font-weight:700;color:#0d6b2a;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}

/* ── Inputs ── */
.inp{
  border:2px solid #ddd;border-radius:10px;
  padding:11px 14px;font-size:15px;color:#1a1a2e;
  background:#f8f8f8;outline:none;
  font-family:'Inter',sans-serif;width:100%;display:block;
  transition:border-color .2s,box-shadow .2s;
}
.inp:focus{border-color:#1a8a3a;box-shadow:0 0 0 3px rgba(26,138,58,.12)}
.inp::placeholder{color:#bbb}
.player-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.player-row .inp{flex:1}
.icon-btn{
  background:#f0f0f0;border:2px solid #ddd;
  border-radius:8px;width:38px;height:38px;cursor:pointer;color:#999;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  transition:all .2s;
}
.icon-btn:hover{border-color:#e05050;color:#e05050}
.text-btn{
  background:#e8f5ec;border:2px solid #1a8a3a;
  border-radius:10px;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:700;
  color:#1a8a3a;width:100%;margin-bottom:.75rem;font-family:'Inter',sans-serif;
  transition:background .2s;
}
.text-btn:hover{background:#d0edda}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:50px;padding:13px 20px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;transition:transform .1s,filter .1s,box-shadow .1s;
  letter-spacing:.5px;text-transform:uppercase;
}
.btn:active{transform:translateY(3px)!important;box-shadow:none!important;filter:brightness(.9)!important}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;filter:none!important;box-shadow:none!important}

.btn-yellow{
  background:linear-gradient(180deg,#ffe040,#f5b800);color:#5a3a00;
  box-shadow:0 5px 0 #c08800,0 7px 12px rgba(200,140,0,.35);
}
.btn-yellow:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 7px 0 #c08800,0 9px 16px rgba(200,140,0,.4)}

.btn-green{
  background:linear-gradient(180deg,#2dcc5f,#1a8a3a);color:#fff;
  box-shadow:0 5px 0 #0d5520,0 7px 12px rgba(13,85,32,.35);
}
.btn-green:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 7px 0 #0d5520,0 9px 16px rgba(13,85,32,.4)}

.btn-red{
  background:linear-gradient(180deg,#ff5555,#cc2020);color:#fff;
  box-shadow:0 5px 0 #881010,0 7px 12px rgba(136,16,16,.35);
}
.btn-red:hover:not(:disabled){transform:translateY(-2px)}

.btn-gray{
  background:linear-gradient(180deg,#ccc,#999);color:#fff;
  box-shadow:0 5px 0 #666,0 7px 12px rgba(0,0,0,.2);
}
.btn-gray:hover:not(:disabled){transform:translateY(-2px)}

.btn-full{width:100%}
.btn-row{display:flex;gap:8px;flex-wrap:nowrap;margin-top:.75rem}
.btn-row .btn{flex:1;min-width:0;padding:13px 4px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.back-btn{
  display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);
  border:none;border-radius:20px;color:#fff;font-family:'Nunito',sans-serif;
  font-size:12px;font-weight:800;cursor:pointer;padding:6px 14px;
  margin-bottom:.75rem;letter-spacing:.5px;text-transform:uppercase;
  transition:background .2s;
}
.back-btn:hover{background:rgba(255,255,255,.3)}

/* ── Home mode cards ── */
.mode-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.mode-card{
  background:#fff;border-radius:16px;
  padding:1rem 1.25rem;cursor:pointer;
  display:flex;align-items:center;gap:14px;
  transition:transform .15s,box-shadow .2s;
  box-shadow:0 4px 14px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.9);
  border-left:6px solid #1a8a3a;
}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.mode-card:active{transform:translateY(0)}
.mc-icon{font-size:34px;flex-shrink:0}
.mc-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#1a1a2e;letter-spacing:.5px}
.mc-sub{font-size:12px;color:#888;margin-top:2px;line-height:1.4}
.mc-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:20px;vertical-align:middle;margin-left:6px;color:#fff}
.mc-badge.orange{background:#f5b800;color:#5a3a00}
.mc-badge.blue{background:#2266dd}
.mc-badge.green{background:#1a8a3a}

/* ── Score pills ── */
.scoreboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:.75rem}
.score-pill{
  background:#f0f7f2;border:2px solid #c8e6d0;
  border-radius:14px;padding:10px 8px;text-align:center;
  transition:all .2s;
}
.score-pill.active{border-color:#1a8a3a;background:#e0f5e8;box-shadow:0 0 0 3px rgba(26,138,58,.15)}
.score-pill.me{border-color:#2266dd;background:#e8f0ff}
.score-pill.cpu-pill.active{border-color:#cc2020;background:#fff0f0;box-shadow:0 0 0 3px rgba(204,32,32,.12)}
.score-pill .pname{font-size:10px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-pill .ppts{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:#1a1a2e}
.score-pill.active .pname{color:#1a8a3a}
.score-pill.active .ppts{color:#1a8a3a}
.score-pill.cpu-pill.active .pname{color:#cc2020}
.score-pill.cpu-pill.active .ppts{color:#cc2020}

/* ── Info bars ── */
.info-bar{
  border-radius:12px;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:#1a8a3a;color:#fff;
  box-shadow:0 3px 0 #0d5520,0 5px 12px rgba(13,85,32,.3);
}
.info-bar .bar-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.info-bar .bar-val{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:#fff}
.info-bar.red-bar{background:#cc2020;box-shadow:0 3px 0 #881010,0 5px 12px rgba(136,16,16,.3);flex-direction:column;align-items:flex-start}
.info-bar.red-bar .bar-label{color:rgba(255,255,255,.7)}

/* ── Tray (dobbelsteenmat) ── */
.tray-wrap{margin-bottom:.75rem}
.tray-outer{
  background:linear-gradient(160deg,#0d5520,#083d16);
  border-radius:20px;padding:10px;
  box-shadow:0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.08);
}
.tray-rim{background:rgba(0,0,0,.2);border-radius:13px;padding:3px}
.tray{
  background:radial-gradient(ellipse at 50% 50%,#1a7a32 0%,#0d5520 100%);
  border-radius:11px;min-height:86px;display:flex;align-items:center;justify-content:center;
  flex-wrap:nowrap;gap:8px;padding:14px 10px;position:relative;overflow:visible;
}
.tray::before{content:'';position:absolute;inset:0;border-radius:11px;pointer-events:none;
  background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.015) 20px,rgba(255,255,255,.015) 21px)}
.tray-cpu{background:radial-gradient(ellipse at 50% 50%,#1a2a5a 0%,#0d1a3a 100%)!important}

.tray-out-wrap{margin-bottom:.75rem}
.tray-out-outer{background:linear-gradient(160deg,#5a0d20,#3a0810);border-radius:20px;padding:10px;box-shadow:0 6px 20px rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.08)}
.tray-out-rim{background:rgba(0,0,0,.2);border-radius:13px;padding:3px}
.tray-out{background:radial-gradient(ellipse at 50% 50%,#8a1a2a 0%,#5a0d18 100%);border-radius:11px;min-height:86px;display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;gap:8px;padding:14px 10px;position:relative;overflow:visible}

/* ── Dobbelstenen ── */
.die{
  width:58px;height:58px;position:relative;cursor:default;
  display:flex;align-items:center;justify-content:center;font-size:42px;
  color:#1a1a2e;background:#fff;border-radius:12px;
  border:2px solid #ddd;
  box-shadow:0 4px 0 rgba(0,0,0,.25),0 5px 12px rgba(0,0,0,.3),inset 0 1px 0 #fff;
  transition:transform .12s,border-color .12s,box-shadow .12s;
  user-select:none;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.die.clickable{cursor:pointer}
.die.clickable:hover,.die.clickable:active{border-color:#f5b800;box-shadow:0 0 0 3px rgba(245,184,0,.4),0 4px 0 rgba(0,0,0,.2);transform:translateY(-5px)}
.die.selected{border-color:#f5b800;background:#fffbe6;transform:translateY(-8px);box-shadow:0 0 0 3px rgba(245,184,0,.5),0 6px 0 #c08800,0 8px 16px rgba(200,140,0,.3)}
.die.selected::after{content:'✓';position:absolute;top:-10px;right:-8px;font-size:11px;background:#f5b800;color:#5a3a00;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.die.used{opacity:.2;filter:grayscale(1);cursor:not-allowed;transform:none!important;box-shadow:none}
.die.cpu-die{background:linear-gradient(145deg,#e8e8e8,#ccc);border-color:#bbb;color:#333}

.die-out{
  width:58px;height:58px;position:relative;display:flex;align-items:center;justify-content:center;font-size:42px;
  color:#fff;background:linear-gradient(145deg,#ff5555,#cc2020);border-radius:12px;
  border:2px solid rgba(255,255,255,.3);
  box-shadow:0 4px 0 rgba(0,0,0,.3),0 5px 12px rgba(200,0,0,.3),inset 0 1px 0 rgba(255,255,255,.2);
  user-select:none;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:default;
  transition:transform .12s,box-shadow .12s;
}
.die-out.clickable-wo{cursor:pointer}
.die-out.clickable-wo:hover,.die-out.clickable-wo:active{transform:translateY(-5px);filter:brightness(1.1)}
.die-out.selected-wo{border-color:#f5b800;transform:translateY(-8px);box-shadow:0 0 0 3px rgba(245,184,0,.5),0 6px 0 #c08800}
.die-out.selected-wo::after{content:'✓';position:absolute;top:-10px;right:-8px;font-size:11px;background:#f5b800;color:#5a3a00;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:900}
.die-out.used-wo{opacity:.2;cursor:not-allowed;transform:none!important;box-shadow:none}

.die.rolling,.die-out.rolling{animation:roll .38s ease forwards}
@keyframes roll{0%{transform:translate(0,0) rotate(0)}20%{transform:translate(-6px,5px) rotate(-15deg)}40%{transform:translate(5px,-6px) rotate(12deg)}60%{transform:translate(-5px,4px) rotate(-10deg)}80%{transform:translate(6px,-4px) rotate(13deg)}100%{transform:translate(0,0) rotate(0)}}

/* ── Messages ── */
.msg-bar{border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;margin-bottom:.5rem;min-height:36px;display:flex;align-items:center;gap:8px}
.msg-bar.info{background:#e8f5ec;color:#1a6b2a;border:2px solid #b8dfc4}
.msg-bar.warn{background:#fff0e8;color:#cc4400;border:2px solid #ffccaa}
.msg-bar.muted{visibility:hidden}
.msg-bar.hint{background:#fffbe6;color:#886600;border:2px solid #ffe080}

/* ── Points table ── */
.pts-card{
  background:#fff;border-radius:16px;border:2px solid #c8e6d0;
  padding:1.1rem;margin-top:.75rem;
  box-shadow:0 3px 12px rgba(0,0,0,.1);
}
table.pts{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
table.pts th{padding:6px 6px;text-align:center;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e8f5ec}
table.pts td{padding:6px 6px;text-align:center;border-bottom:1px solid #f0f7f2;font-size:20px}
table.pts td:not(:first-child){font-size:13px}
table.pts tr:last-child td{border-bottom:none}
table.pts .val{font-weight:700;color:#1a1a2e}
table.pts .none{color:#ccc}
table.pts .win-pill{display:inline-block;background:#f5b800;color:#5a3a00;font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:20px;vertical-align:middle}

/* ── Saldo ── */
.saldo-card{background:#fff;border-radius:14px;border:2px solid #c8e6d0;padding:1rem;margin-top:.75rem;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.saldo-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f7f2;font-size:14px}
.saldo-row:last-child{border-bottom:none}
.saldo-row .sname{font-weight:600;color:#333}
.saldo-row .sval{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900}
.saldo-row .sval.pos{color:#1a8a3a}
.saldo-row .sval.neg{color:#cc2020}

/* ── Winner ── */
.winner-card{
  background:#fff;border-radius:20px;border:3px solid #f5b800;
  padding:1.75rem;text-align:center;margin-bottom:.75rem;
  box-shadow:0 6px 0 #c08800,0 10px 30px rgba(200,140,0,.2);
}
.winner-card .trophy{font-size:56px;margin-bottom:.5rem;filter:drop-shadow(0 3px 6px rgba(200,140,0,.4))}
.winner-card h2{font-family:'Nunito',sans-serif;font-size:30px;font-weight:900;color:#1a1a2e;margin-bottom:.2rem}
.winner-card .sub{font-size:13px;color:#888;margin-bottom:1rem}
.final-list{text-align:left;margin-bottom:.5rem}
.final-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f7f2;font-size:14px;color:#555}
.final-row:last-child{border-bottom:none}
.final-row.top{color:#1a8a3a;font-weight:700}
.sect-title{font-size:11px;font-weight:700;color:#1a8a3a;text-transform:uppercase;letter-spacing:1.5px;margin:.75rem 0 .25rem;text-align:left}

/* ── Popup ── */
.popup-overlay{position:fixed;inset:0;background:rgba(0,40,10,.85);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup-box{
  background:#fff;border-radius:22px;padding:2rem 1.75rem;text-align:center;max-width:340px;width:92%;
  border:3px solid #f5b800;
  box-shadow:0 8px 0 #c08800,0 14px 40px rgba(0,0,0,.3);
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.popup-title{font-family:'Nunito',sans-serif;font-size:54px;font-weight:900;color:#cc2020;letter-spacing:2px;line-height:1;text-shadow:0 4px 0 rgba(136,16,16,.3);margin-bottom:.4rem}
.popup-sub{font-size:14px;color:#555;margin-bottom:1.5rem;line-height:1.6}
.raad-knoppen{display:flex;gap:10px;margin-bottom:.5rem;justify-content:center}
.raad-knop{
  flex:1;background:linear-gradient(180deg,#2dcc5f,#1a8a3a);color:#fff;border:none;
  border-radius:14px;padding:16px 8px;font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;
  cursor:pointer;box-shadow:0 4px 0 #0d5520,0 6px 14px rgba(13,85,32,.3);
  transition:transform .12s;
}
.raad-knop:hover{transform:translateY(-2px)}
.raad-knop:active{transform:translateY(2px);box-shadow:none}

/* ── Title ── */
.title-bar{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;letter-spacing:4px;color:#fff;text-align:center;margin-bottom:.15rem;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.title-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.6);text-align:center;margin-bottom:1rem;letter-spacing:.5px;text-transform:uppercase}

/* ── Lobby ── */
.lobby-code{
  font-family:'Nunito',sans-serif;font-size:52px;font-weight:900;letter-spacing:12px;
  color:#1a8a3a;text-align:center;margin:1rem 0;
  background:#f0f7f2;border-radius:14px;padding:.75rem;border:2px solid #c8e6d0;
}
.waiting-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f7f2;font-size:14px;color:#333}
.waiting-row:last-child{border-bottom:none}
.waiting-dot{width:9px;height:9px;border-radius:50%;background:#2dcc5f;box-shadow:0 0 6px rgba(45,204,95,.6);flex-shrink:0}
.spectator-msg{background:#fffbe6;border-radius:10px;padding:10px 12px;text-align:center;font-size:13px;color:#886600;margin-bottom:.5rem;border:2px solid #ffe080;font-weight:600}

/* ── Wins bar ── */
.wins-bar{display:flex;gap:8px;align-items:center;margin-bottom:.75rem;background:#f0f7f2;border:2px solid #c8e6d0;border-radius:12px;padding:10px 14px}

/* ── Score history ── */
.score-hist{background:#fff;border-radius:14px;border:2px solid #c8e6d0;padding:1rem;margin-top:.75rem;box-shadow:0 3px 10px rgba(0,0,0,.08)}

.footer{text-align:center;font-size:10px;color:rgba(255,255,255,.3);margin-top:1.5rem;padding-bottom:1rem;letter-spacing:2px;text-transform:uppercase}
.cpu-info-pill{background:#f0f7f2;border:2px solid #c8e6d0;border-radius:10px;padding:10px 12px;font-size:14px;color:#555;margin-bottom:.75rem;width:100%;font-weight:600}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="page" id="app"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,update,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const FC={apiKey:"AIzaSyBruJaRXPVS7dWrSl7Efilwh-GzS2eoF1k",authDomain:"wurpen-dc3bd.firebaseapp.com",databaseURL:"https://wurpen-dc3bd-default-rtdb.europe-west1.firebasedatabase.app",projectId:"wurpen-dc3bd",storageBucket:"wurpen-dc3bd.firebasestorage.app",messagingSenderId:"21344488506",appId:"1:21344488506:web:7a2f5860418bde5daf7903"};
const fbApp=initializeApp(FC);const db=getDatabase(fbApp);
const FACES=['⚀','⚁','⚂','⚃','⚄','⚅'].map(f=>`<span style="color:#fff;font-style:normal;text-shadow:0 1px 3px rgba(0,0,0,.4)">${f}</span>`);
let MODE='home';

function goHome(){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,40,10,.85);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center';
  ov.innerHTML=`<div style="background:#fff;border-radius:22px;padding:2rem 1.75rem;text-align:center;max-width:300px;width:90%;border:3px solid #f5b800;box-shadow:0 8px 0 #c08800,0 14px 40px rgba(0,0,0,.25)">
    <div style="font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:#1a1a2e;margin-bottom:.5rem">Terug naar menu?</div>

// ── Helpers ────────────────────────────────────
function calcScore(vals){let c={};vals.forEach(v=>c[v]=(c[v]||0)+1);let score=0,iwin=false;for(let v=1;v<=6;v++){const n=c[v]||0,base=v===1?1000:v*100;if(n>=5){if(v===1)iwin=true;score+=base*2;c[v]-=5;}else if(n===4){score+=Math.round(base*1.5);c[v]-=4;}else if(n>=3){score+=base;c[v]-=3;}}score+=(c[1]||0)*100+(c[5]||0)*50;return{score,instantWin:iwin};}
function evalSel(sel,dice){if(!sel||!sel.length)return{valid:false,score:0,instantWin:false};const vals=sel.map(i=>dice[i]);let c={};vals.forEach(v=>c[v]=(c[v]||0)+1);for(let v=2;v<=6;v++){if(v===5)continue;if((c[v]||0)>0&&c[v]<3)return{valid:false,score:0,instantWin:false};}const{score,instantWin}=calcScore(vals);return{valid:score>0,score,instantWin};}
function canSelect(idx,fi,dice){const v=dice[idx];if(v===1||v===5)return true;let c={};fi.forEach(i=>{const vi=dice[i];if(!c[vi])c[vi]=[];c[vi].push(i);});return(c[v]||[]).length>=3;}
function generateRaadOpties(echt){const pool=[-200,-150,-100,-50,50,100,150,200].sort(()=>Math.random()-.5);let w1=Math.max(0,echt+pool[0]),w2=Math.max(0,echt+pool[1]);if(w1===echt)w1+=50;if(w2===echt)w2-=50;if(w1===w2)w2+=100;return[echt,w1,w2].sort(()=>Math.random()-.5);}

function spInitial(){spHistory.length=0;return{screen:'setup',playerName:'',playerScore:0,cpuScore:0,playerBeurten:0,cpuBeurten:0,isPlayerTurn:true,dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',message:'',msgType:'',popup:null,zegWurpClicked:false,wurpDoel:4444,spelNummer:1,cpuThinking:false,cpuMsg:'',_winner:null,cpuDice:[1,1,1,1,1],cpuDiceState:['free','free','free','free','free'],cpuTurnScore:0,cpuTotalHeld:0,showCpuDice:false,playerWins:0,cpuWins:0};}
let SP=spInitial();
function spSelIdx(){return SP.diceState.map((s,i)=>s==='selected'?i:-1).filter(i=>i>=0);}

function getScoringGroups(freeIdxs,dice){let c={};freeIdxs.forEach(i=>{const v=dice[i];if(!c[v])c[v]=[];c[v].push(i);});let groups=[];for(let v=1;v<=6;v++){const g=c[v]||[],base=v===1?1000:v*100;if(g.length>=5)groups.push({indices:g.slice(0,5),score:base*2});else if(g.length===4)groups.push({indices:g.slice(0,4),score:Math.round(base*1.5)});else if(g.length>=3)groups.push({indices:g.slice(0,3),score:base});const rest=g.length>=3?g.slice(3):g;if(v===1)rest.forEach(i=>groups.push({indices:[i],score:100}));if(v===5)rest.forEach(i=>groups.push({indices:[i],score:50}));}return groups;}

function cpuDecide(dice,diceState,turnScore,cpuScore,playerScore,wurpDoel,totalScoringHeld){
  const freeIdxs=diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);
  const groups=getScoringGroups(freeIdxs,dice);if(!groups.length)return{select:[],stop:true};
  const sel=[...new Set(groups.flatMap(g=>g.indices))];
  const addedScore=calcScore(sel.map(i=>dice[i])).score;const total=turnScore+addedScore;
  const projectedCpuScore=cpuScore+total;const vrijNaSelectie=freeIdxs.length-sel.length;
  const newTotalHeld=(totalScoringHeld||0)+sel.length;
  if(newTotalHeld<3)return{select:sel,stop:false};
  if(playerScore>=wurpDoel){if(projectedCpuScore>playerScore)return{select:sel,stop:true};return{select:sel,stop:false};}
  if(vrijNaSelectie===0)return{select:sel,stop:false};
  if(vrijNaSelectie>=4)return{select:sel,stop:false};
  if(total<150)return{select:sel,stop:false};
  const achterstand=playerScore-cpuScore;
  if(achterstand>1000&&total<700)return{select:sel,stop:false};
  if(achterstand>800&&total<500)return{select:sel,stop:false};
  return{select:sel,stop:true};
}

function spCpuTurn(){SP.cpuDice=[1,1,1,1,1];SP.cpuDiceState=['free','free','free','free','free'];SP.cpuTurnScore=0;SP.cpuTotalHeld=0;SP.showCpuDice=true;SP.cpuThinking=true;spRender();setTimeout(()=>spCpuRollStep(),800);}
function spCpuRollStep(){
  const toRoll=SP.cpuDiceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);
  if(!toRoll.length){spEndCpuTurn(SP.cpuTurnScore);return;}spRender();
  const els=document.querySelectorAll('#cpu-tray .die');toRoll.forEach(i=>els[i]?.classList.add('rolling'));
  setTimeout(()=>{
    toRoll.forEach(i=>SP.cpuDice[i]=Math.ceil(Math.random()*6));
    document.querySelectorAll('#cpu-tray .die.rolling').forEach(el=>el.classList.remove('rolling'));
    const fi=SP.cpuDiceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);
    let c={};fi.forEach(i=>{const v=SP.cpuDice[i];c[v]=(c[v]||0)+1;});
    const anyScore=fi.some(i=>{const v=SP.cpuDice[i];return v===1||v===5||(c[v]>=3);});
    if(!anyScore){SP.cpuTurnScore=0;SP.cpuThinking=false;spRender();setTimeout(()=>spEndCpuTurn(0),1200);return;}
    let{select,stop}=cpuDecide(SP.cpuDice,SP.cpuDiceState,SP.cpuTurnScore,SP.cpuScore,SP.playerScore,SP.wurpDoel,SP.cpuTotalHeld);
    select.forEach(i=>SP.cpuDiceState[i]='selected');
    const selScore=calcScore(select.map(i=>SP.cpuDice[i])).score;SP.cpuTurnScore+=selScore;SP.cpuTotalHeld=(SP.cpuTotalHeld||0)+select.length;
    if(stop){SP.cpuThinking=false;spRender();setTimeout(()=>spEndCpuTurn(SP.cpuTurnScore),1200);}
    else{select.forEach(i=>SP.cpuDiceState[i]='used');if(SP.cpuDiceState.every(s=>s==='used')){SP.cpuDiceState=['free','free','free','free','free'];SP.cpuTotalHeld=0;}spRender();setTimeout(()=>spCpuRollStep(),900);}
  },420);
}
function spEndCpuTurn(scored){SP.cpuScore+=scored;SP.cpuBeurten++;spHistory.push({naam:'💻 Computer',score:scored});SP.showCpuDice=false;SP.cpuThinking=false;spCheckWinner('cpu');}
function spCheckWinner(who){
  const maxScore=Math.max(SP.playerScore,SP.cpuScore);const allEqual=SP.playerBeurten===SP.cpuBeurten;
  if(maxScore>=SP.wurpDoel&&allEqual){
    if(SP.playerScore>SP.cpuScore){SP._winner='player';SP.playerWins++;}
    else if(SP.cpuScore>SP.playerScore){SP._winner='cpu';SP.cpuWins++;}
    else SP._winner='draw';
    SP.screen='winner';spRender();launchConfetti();
  }else{
    if(who==='player'){SP.isPlayerTurn=false;SP.message='';SP.msgType='';spRender();setTimeout(()=>spCpuTurn(),600);}
    else{SP.isPlayerTurn=true;SP.message='Jouw beurt! Druk op Wurp nu!';SP.msgType='info';spResetPlayerTurn();spRender();}
  }
}
function spResetPlayerTurn(){SP.dice=[1,1,1,1,1];SP.diceState=['free','free','free','free','free'];SP.turnScore=0;SP.phase='idle';SP.message='';SP.msgType='';SP.zegWurpClicked=false;SP.popup=null;}
function spDoRoll(){
  const si=spSelIdx();const{valid,score,instantWin}=evalSel(si,SP.dice);
  if(SP.phase==='thrown'&&!valid){SP.message='Selecteer eerst een geldige combinatie!';SP.msgType='warn';spRender();return;}
  if(valid){SP.turnScore+=score;si.forEach(i=>SP.diceState[i]='used');if(instantWin){spOpenRaad(SP.turnScore);return;}}
  if(SP.diceState.every(s=>s==='used')){SP.diceState=['free','free','free','free','free'];SP.message='Alle stenen scoren! Gooi opnieuw.';SP.msgType='info';}
  const toRoll=SP.diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);SP.zegWurpClicked=false;SP.phase='thrown';spRender();
  const els=document.querySelectorAll('#tray .die');toRoll.forEach(i=>els[i]?.classList.add('rolling'));

function mpSubscribe(){
  if(mpUnsub)mpUnsub();mpHistory.length=0;
  mpUnsub=onValue(mpGr(''),snap=>{
    const prev=mpG;mpG=snap.val();mpRender();if(mpG?.screen==='winner')launchConfetti();

      const prevD=prev.dice||[];const newD=mpG.dice||[];const ds=mpG.diceState||[];

async function mpStartGame(){const players=Object.values(mpG.players||{});const order=players.map(p=>p.id).sort(()=>Math.random()-.5);const scores={},beurten={},saldo={};players.forEach(p=>{scores[p.id]=0;beurten[p.id]=0;saldo[p.id]=mpG.saldo?.[p.id]||0;});const doel=parseInt(document.getElementById('wurp-doel-input')?.value||4444);const firstName=players.find(p=>p.id===order[0])?.name||'?';await mpUpd('',{screen:'game',playerOrder:order,currentIdx:0,scores,beurten,saldo,spelNummer:mpG.spelNummer||1,wurpDoel:isNaN(doel)||doel<100?4444:doel,dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',zegWurpClicked:false,popup:null,message:`${firstName}, druk op Wurp nu!`,msgType:'info'});}

async function mpDoRoll(){
  const dice=[...(mpG.dice||[1,1,1,1,1])];const ds=[...(mpG.diceState||['free','free','free','free','free'])];
  const si=mpSelIdx(ds);const{valid,score,instantWin}=evalSel(si,dice);
  if(mpG.phase==='thrown'&&!valid){await mpUpd('',{message:'Selecteer eerst een geldige combinatie!',msgType:'warn'});return;}
  let ts=mpG.turnScore||0;
  if(valid){ts+=score;si.forEach(i=>ds[i]='used');if(instantWin){await mpOpenRaad(ts,ds);return;}}
  if(ds.every(s=>s==='used'))ds.fill('free');
  const toRoll=ds.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);
  const nd=[...dice];toRoll.forEach(i=>nd[i]=Math.ceil(Math.random()*6));
  const els=document.querySelectorAll('#tray .die');toRoll.forEach(i=>els[i]?.classList.add('rolling'));
  setTimeout(async()=>{
    document.querySelectorAll('#tray .die.rolling').forEach(el=>el.classList.remove('rolling'));
    const fi=ds.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);let c={};fi.forEach(i=>{const v=nd[i];c[v]=(c[v]||0)+1;});
    const any=fi.some(i=>{const v=nd[i];return v===1||v===5||(c[v]>=3);});
    if(!any){
      const curId=(mpG.playerOrder||[])[(mpG.currentIdx||0)];const curName=Object.values(mpG.players||{}).find(p=>p.id===curId)?.name||'?';
      mpHistory.push({naam:curName,score:0});
      await mpUpd('',{dice:nd,diceState:ds,turnScore:0,phase:'bust',zegWurpClicked:false,popup:null,message:'Geen punten! Beurt voorbij.',msgType:'warn'});
      setTimeout(()=>mpEndTurn(),1400);
    } else {
      await mpUpd('',{dice:nd,diceState:ds,turnScore:ts,phase:'thrown',zegWurpClicked:false,popup:null,message:'Klik op dobbelstenen om te selecteren.',msgType:'info'});
    }
  },420);
}

async function mpHandleRaad(gok){const echt=mpG.popup.echt;const order=mpG.playerOrder||[];const curId=order[mpG.currentIdx||0];const scores={...(mpG.scores||{})};const curName=Object.values(mpG.players||{}).find(p=>p.id===curId)?.name||'?';if(gok===echt){scores[curId]=(scores[curId]||0)+echt;mpHistory.push({naam:curName,score:echt});await mpUpd('',{scores,popup:null});mpEndTurn();}else if(gok>echt){await mpUpd('popup',{type:'loser',playerId:mpMyId,echt,gok});}else{const gemist=echt-gok;scores[curId]=(scores[curId]||0)+gok;mpHistory.push({naam:curName,score:gok});await mpUpd('',{scores,popup:{type:'sukkel',playerId:mpMyId,gekregen:gok,gemist}});}}
async function mpEndTurn(){const order=mpG.playerOrder||[];const beurten={...(mpG.beurten||{})};const curId=order[mpG.currentIdx||0];beurten[curId]=(beurten[curId]||0)+1;const scores=mpG.scores||{};const maxScore=Math.max(...Object.values(scores).map(Number));const allEqual=order.every(id=>beurten[id]===beurten[order[0]]);if(maxScore>=(mpG.wurpDoel||4444)&&allEqual)await mpCheckWinner(beurten,scores,order);else{const nextIdx=((mpG.currentIdx||0)+1)%order.length;const nextName=Object.values(mpG.players||{}).find(p=>p.id===order[nextIdx])?.name||'?';await mpUpd('',{beurten,currentIdx:nextIdx,dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',zegWurpClicked:false,popup:null,message:`Wurpbeurt van ${nextName}. Druk op Wurp nu!`,msgType:'info'});}}

async function mpDoWoBank(){const si=mpSelIdx(mpG.woDiceState);const{valid,score}=evalSel(si,mpG.woDice||[]);const ts=(mpG.woTurnScore||0)+(valid?score:0);const curId=(mpG.woPlayers||[])[mpG.woCurrent||0];await mpUpd('',{woScores:{...(mpG.woScores||{}),[curId]:ts}});mpNextWoPlayer();}

function tbBlockchainData(){return TB.players.map((naam,i)=>({naam,score:TB.saldo[i]||0}));}

function tbPopupHTML(){if(!TB.popup)return'';const p=TB.popup;
  if(p.type==='raad')return`<div class="popup-overlay"><div class="popup-box"><div style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:#1a1a2e;margin-bottom:.5rem">Hoeveel punten heb je?</div><p class="popup-sub">Kies het juiste aantal punten.</p><div class="raad-knoppen">${p.opts.map(o=>`<button class="raad-knop" data-raad="${o}">${o}</button>`).join('')}</div></div></div>`;
  if(p.type==='sukkel')return`<div class="popup-overlay"><div class="popup-box"><div class="popup-title">SUKKEL!</div><p class="popup-sub">Je hebt <strong>${p.data.gekregen}</strong> punten gekregen,<br>maar je had nog <strong>${p.data.gemist}</strong> meer kunnen krijgen!</p><button class="btn btn-yellow" id="close-popup" style="width:100%">Oké...</button></div></div>`;
  if(p.type==='loser')return`<div class="popup-overlay"><div class="popup-box"><div class="popup-title">LOSER!</div><p class="popup-sub">Je had maar <strong>${p.data.echt}</strong> punten,<br>maar jij koos <strong>${p.data.gok}</strong>.<br>Je krijgt <strong style="color:#cc2020">nul</strong> punten!</p><button class="btn btn-yellow" id="close-popup" style="width:100%">Oké...</button></div></div>`;
  if(p.type==='zegwurp')return`<div class="popup-overlay"><div class="popup-box"><div class="popup-title">SUKKEL!</div><p class="popup-sub">Je vergat eerst op "ZEG WURP!" te klikken.</p><button class="btn btn-yellow" id="close-popup" style="width:100%">Oké...</button></div></div>`;
  return'';}

function tbRender(){document.getElementById('app').innerHTML=TB.screen==='setup'?tbSetupHTML():TB.screen==='inzet'?tbInzetHTML():TB.screen==='game'?tbGameHTML():TB.screen==='wurpout'?tbWurpOutHTML():tbWinnerHTML();tbBindEvents();}

function tbSetupHTML(){let rows=TB.players.map((p,i)=>`<div class="player-row"><input class="inp" type="text" value="${p}" placeholder="Naam ${i+1}" data-idx="${i}"><button class="icon-btn" data-del="${i}">✕</button></div>`).join('');
  return`${backBtn()}<div class="panel"><div class="title-bar">TABLE WURP</div><div class="title-sub">Speel samen op een scherm</div><div class="section-label">Namen (2–10)</div>${rows}${TB.players.length<10?`<button class="text-btn" id="add-player">+ Naam toevoegen</button>`:''}<div class="section-label">Wurpdoel</div><input class="inp" type="number" id="wurp-doel-input" value="${TB.wurpDoel}" min="100" style="margin-bottom:.75rem"><div class="section-label">Inzet per speler</div><div id="inzet-row" style="display:flex;gap:8px;margin-bottom:1rem">${[10,20,50].map(v=>`<button class="btn ${TB.inzet===v?'btn-yellow':'btn-green'}" data-inzet="${v}" style="flex:1">€${v}</button>`).join('')}</div><button class="btn btn-yellow btn-full" id="start-game" ${TB.players.filter(p=>p.trim()).length<2?'disabled':''}>Start met wurpen! 🎲</button></div>${scoreHistHTML(tbHistory)}`;}

function tbInzetHTML(){return`${backBtn()}<div class="panel"><div class="title-bar">TABLE WURP</div><p style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:.75rem">Inzet aanpassen voor spel ${TB.spelNummer+1}.</p><div id="inzet-row" style="display:flex;gap:8px;margin-bottom:1.25rem">${[10,20,50].map(v=>`<button class="btn ${TB.inzet===v?'btn-yellow':'btn-green'}" data-inzet="${v}" style="flex:1">€${v}</button>`).join('')}</div><button class="btn btn-yellow btn-full" id="start-volgend">Spel ${TB.spelNummer+1} starten!</button></div>`;}

function tbGameHTML(){
  const p=TB.players[TB.currentIdx];const si=tbSelIdx();const{valid}=evalSel(si,TB.dice);
  let pills=TB.players.map((pl,i)=>`<div class="score-pill ${i===TB.currentIdx?'active':''}"><div class="pname">${pl}</div><div class="ppts">${TB.scores[i]}</div></div>`).join('');
  let diceHTML=TB.dice.map((v,i)=>{const ds=TB.diceState[i];let cls='die';if(ds==='used')cls+=' used';else if(ds==='selected')cls+=' selected';else if(TB.phase==='thrown')cls+=' clickable';return`<div class="${cls}" data-die="${i}">${FACES[v-1]}</div>`;}).join('');
  const canRoll=(TB.phase==='idle'||(TB.phase==='thrown'&&valid))&&!TB.zegWurpClicked;const canBank=TB.turnScore>0||(TB.phase==='thrown'&&valid);const incomplete=TB.phase==='thrown'&&si.length>0&&!valid;
  let saldoBlock='';if(TB.geschiedenis.length>0){let rows=TB.players.map((pl,i)=>{const s=TB.saldo[i]||0;return`<div class="saldo-row"><span class="sname">${pl}</span><span class="sval ${s>=0?'pos':'neg'}">${s>=0?'+':''}€${s}</span></div>`;}).join('');saldoBlock=`<div class="saldo-card"><div class="section-label" style="margin-bottom:.4rem">De Blockchain</div>${rows}</div>`;}
  return`${tbPopupHTML()}${backBtn()}
  <div class="scoreboard">${pills}</div>
  <div style="display:flex;gap:.6rem;align-items:stretch;margin-bottom:.6rem">
    <div class="info-bar red-bar" style="min-width:95px;flex:0 0 auto"><div class="bar-label">Wurpdoel</div><div class="bar-val">${TB.wurpDoel.toLocaleString('nl')}</div></div>
    <div class="info-bar" style="flex:1"><div><div class="bar-label">Beurt van</div><div class="bar-val" style="font-size:17px">${p}</div></div><div style="text-align:right"><div class="bar-label">Inzet·Pot</div><div class="bar-val" style="font-size:15px">€${TB.inzet}·€${TB.players.length*TB.inzet}</div></div></div>
  </div>
  <div class="msg-bar ${TB.msgType||'info'}" style="visibility:${TB.message&&TB.msgType&&TB.msgType!=='muted'?'visible':'hidden'}">${TB.message||'&nbsp;'}</div>
  <div class="tray-wrap"><div class="tray-outer"><div class="tray-rim"><div class="tray" id="tray">${diceHTML}</div></div></div></div>
  <div class="msg-bar hint" style="visibility:${incomplete?'visible':'hidden'}">⚠ Selecteer een volledige combinatie.</div>
  <div class="btn-row">
    <button class="btn btn-red" id="zeg-wurp-btn" ${!canBank||TB.zegWurpClicked?'disabled':''} style="${TB.zegWurpClicked?'opacity:.3;cursor:not-allowed':''}">📢 ZEG WURP!</button>
    <button class="btn btn-green" id="roll-btn" ${!canRoll?'disabled':''}>🎲 Wurp nu!</button>
    <button class="btn btn-yellow" id="bank-btn" ${!canBank?'disabled':''}>💰 WURP!</button>
  </div>
  ${saldoBlock}${scoreHistHTML(tbHistory)}`;}

function tbWurpOutHTML(){
  const allDone=TB.woCurrent>=TB.woPlayers.length;const curIdx=!allDone?TB.woPlayers[TB.woCurrent]:-1;const curName=!allDone?TB.players[curIdx]:'';
  let woRows=TB.woPlayers.map(idx=>{const sc=TB.woScores[idx];const done=sc!==undefined;return`<div class="saldo-row"><span class="sname">${TB.players[idx]}</span><span class="sval ${done?(sc>0?'pos':'neg'):'neg'}">${done?sc+'pt':'—'}</span></div>`;}).join('');
  let content='';if(!allDone){const wsi=tbWoSelIdx();const{valid:wValid}=evalSel(wsi,TB.woDice);const canWoRoll=TB.woPhase==='idle'||(TB.woPhase==='thrown'&&wValid);const canWoBank=TB.woTurnScore>0||(TB.woPhase==='thrown'&&wValid);let diceHTML=TB.woDice.map((v,i)=>{const ds=TB.woDiceState[i];let cls='die-out';if(ds==='used')cls+=' used-wo';else if(ds==='selected')cls+=' selected-wo';else if(TB.woPhase==='thrown')cls+=' clickable-wo';return`<div class="${cls}" data-wodie="${i}">${FACES[v-1]}</div>`;}).join('');content=`<div style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem">Beurt van: <span style="color:#cc2020;font-size:15px;font-family:'Nunito',sans-serif;font-weight:900">${curName}</span></div><div class="tray-out-wrap"><div class="tray-out-outer"><div class="tray-out-rim"><div class="tray-out" id="tray-out">${diceHTML}</div></div></div></div><div class="msg-bar ${TB.woMsgType||'info'}" style="visibility:${TB.woMessage&&TB.woMsgType&&TB.woMsgType!=='muted'?'visible':'hidden'}">${TB.woMessage||'&nbsp;'}</div><div class="btn-row"><button class="btn btn-green" id="wo-roll-btn" ${!canWoRoll?'disabled':''}>🎲 Gooi!</button><button class="btn btn-yellow" id="wo-bank-btn" ${!canWoBank?'disabled':''}>💰 WURP!</button></div>`;}
  else{const maxWo=Math.max(...TB.woPlayers.map(i=>TB.woScores[i]||0));const winners=TB.woPlayers.filter(i=>(TB.woScores[i]||0)===maxWo);if(winners.length===1)content=`<p style="font-size:14px;color:#555;margin-bottom:1rem">🏆 <strong>${TB.players[winners[0]]}</strong> wint de Wurp Out!</p><button class="btn btn-yellow btn-full" id="wo-finish">Bekijk eindstand</button>`;else content=`<p style="font-size:14px;color:#555;margin-bottom:1rem">Nog steeds gelijk!</p><button class="btn btn-yellow btn-full" id="wo-again">Opnieuw Wurp Out</button>`;}
  return`${backBtn()}<div class="panel"><div style="font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:#cc2020;text-align:center;margin-bottom:.5rem">⚡ WURP OUT!</div><p style="font-size:12px;color:#888;text-align:center;margin-bottom:.75rem">Gelijkspel! Elke speler gooit een beurt.</p><div style="margin-bottom:.75rem">${woRows}</div>${content}</div>${scoreHistHTML(tbHistory)}`;}

function tbWinnerHTML(){
  const wi=TB._winnerIdx!==undefined?TB._winnerIdx:0;const w=TB.players[wi],tot=TB.players.length*TB.inzet;
  let uitslag=TB.players.map((p,i)=>{const sl=i===wi&&TB._fromWurpOut?`${TB._woWinnerScore}pt`:`${TB.scores[i]}pt`;return`<div class="final-row ${i===wi?'top':''}"><span>${i===wi?'🏆 ':''}${p} — ${sl}</span><span>${i===wi?`+€${tot-TB.inzet}`:`-€${TB.inzet}`}</span></div>`;}).join('');
  let saldo=TB.players.map((p,i)=>{const s=TB.saldo[i]||0;return`<div class="final-row"><span>${p}</span><span style="color:${s>=0?'#1a8a3a':'#cc2020'};font-weight:700">${s>=0?'+':''}€${s}</span></div>`;}).join('');
  let hist=TB.geschiedenis.map(g=>`<div class="final-row"><span>Spel ${g.spel}</span><span>🏆 ${g.winnaar} · €${g.inzet}</span></div>`).join('');
  return`${backBtn()}<div class="winner-card"><div class="trophy">🏆</div><h2>${w} wint!</h2><p class="sub">${TB._fromWurpOut?'Gewonnen via Wurp Out! · ':''}Pot: €${tot}</p><div class="sect-title">Eindstand</div><div class="final-list">${uitslag}</div><div class="sect-title">De Blockchain</div><div class="final-list">${saldo}</div>${TB.geschiedenis.length>1?`<div class="sect-title">Geschiedenis</div><div class="final-list">${hist}</div>`:''}<div class="btn-row" style="justify-content:center;margin-top:1.25rem"><button class="btn btn-yellow" id="volgend-spel">Volgend spel</button><button class="btn btn-green" id="tb-screenshot">📸 Screenshot</button><button class="btn btn-green" id="btn-tikkie">Naar Tikkie</button></div></div>${scoreHistHTML(tbHistory)}`;}

function tbBindEvents(){
  document.getElementById('back-home')?.addEventListener('click',goHome);
  document.getElementById('add-player')?.addEventListener('click',()=>{TB.players.push('');tbRender();});
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{TB.players.splice(+e.currentTarget.dataset.del,1);tbRender();}));
  document.querySelectorAll('[data-idx]').forEach(inp=>inp.addEventListener('input',e=>{TB.players[+e.target.dataset.idx]=e.target.value;const btn=document.getElementById('start-game');if(btn)btn.disabled=TB.players.filter(p=>p.trim()).length<2;}));
  document.getElementById('inzet-row')?.addEventListener('click',e=>{const b=e.target.closest('[data-inzet]');if(!b)return;TB.inzet=+b.dataset.inzet;document.querySelectorAll('#inzet-row [data-inzet]').forEach(btn=>{const sel=+btn.dataset.inzet===TB.inzet;btn.className=`btn ${sel?'btn-yellow':'btn-green'}`;btn.style.flex='1';});});
  document.getElementById('wurp-doel-input')?.addEventListener('input',e=>{const v=parseInt(e.target.value);if(v>=100)TB.wurpDoel=v;});
  document.getElementById('start-game')?.addEventListener('click',()=>{TB.players=TB.players.filter(p=>p.trim());if(TB.players.length<2)return;const d=document.getElementById('wurp-doel-input');if(d){const v=parseInt(d.value);if(v>=100)TB.wurpDoel=v;}if(TB.saldo.length===0)TB.saldo=TB.players.map(()=>0);TB.scores=TB.players.map(()=>0);TB.beurten=TB.players.map(()=>0);TB._winnerIdx=undefined;TB._fromWurpOut=false;TB.screen='game';tbResetTurn();TB.message=`${TB.players[0]}, druk op Wurp nu!`;TB.msgType='info';tbRender();});
  document.getElementById('start-volgend')?.addEventListener('click',()=>{tbHistory.length=0;TB.spelNummer++;TB.scores=TB.players.map(()=>0);TB.beurten=TB.players.map(()=>0);TB._winnerIdx=undefined;TB._fromWurpOut=false;TB.screen='game';tbResetTurn();TB.message=`Spel ${TB.spelNummer} — ${TB.players[0]}, druk op Wurp nu!`;TB.msgType='info';tbRender();});
  document.getElementById('roll-btn')?.addEventListener('click',tbDoRoll);
  document.getElementById('zeg-wurp-btn')?.addEventListener('click',()=>{if(TB.zegWurpClicked)return;TB.zegWurpClicked=true;TB.message='📢 ZEG WURP! — druk nu op WURP!';TB.msgType='info';tbRender();});
  document.getElementById('bank-btn')?.addEventListener('click',tbDoBank);
  document.getElementById('close-popup')?.addEventListener('click',()=>{TB.popup=null;tbEndTurn();});
  document.querySelectorAll('[data-raad]').forEach(btn=>btn.addEventListener('click',e=>tbHandleRaad(+e.currentTarget.dataset.raad)));
  document.querySelectorAll('.die.clickable,.die.selected').forEach(d=>{d.addEventListener('click',e=>{if(TB.phase!=='thrown')return;const i=+e.currentTarget.dataset.die;if(TB.diceState[i]==='used')return;const fi=TB.diceState.map((s,j)=>s==='free'||s==='selected'?j:-1).filter(j=>j>=0);if(TB.diceState[i]==='selected')TB.diceState[i]='free';else if(canSelect(i,fi,TB.dice))TB.diceState[i]='selected';else{TB.message='Deze steen scoort niet alleen.';TB.msgType='hint';}tbRender();});});
  document.getElementById('wo-roll-btn')?.addEventListener('click',tbDoWoRoll);
  document.getElementById('wo-bank-btn')?.addEventListener('click',tbDoWoBank);
  document.querySelectorAll('.die-out.clickable-wo,.die-out.selected-wo').forEach(d=>{d.addEventListener('click',e=>{if(TB.woPhase!=='thrown')return;const i=+e.currentTarget.dataset.wodie;const fi=TB.woDiceState.map((s,j)=>s==='free'||s==='selected'?j:-1).filter(j=>j>=0);if(TB.woDiceState[i]==='selected')TB.woDiceState[i]='free';else if(canSelect(i,fi,TB.woDice))TB.woDiceState[i]='selected';else{TB.woMessage='Deze steen scoort niet alleen.';TB.woMsgType='hint';}tbRender();});});
  document.getElementById('wo-finish')?.addEventListener('click',()=>{const maxWo=Math.max(...TB.woPlayers.map(i=>TB.woScores[i]||0));tbHandleWin(TB.woPlayers.find(i=>(TB.woScores[i]||0)===maxWo),true);});
  document.getElementById('wo-again')?.addEventListener('click',()=>{const maxWo=Math.max(...TB.woPlayers.map(i=>TB.woScores[i]||0));tbStartWurpOut(TB.woPlayers.filter(i=>(TB.woScores[i]||0)===maxWo));});
  document.getElementById('volgend-spel')?.addEventListener('click',()=>{TB.screen='inzet';tbRender();});
  document.getElementById('tb-screenshot')?.addEventListener('click',()=>takeScreenshot(tbBlockchainData(),'De Blockchain'));
  document.getElementById('btn-tikkie')?.addEventListener('click',()=>window.location.href='https://tikkie.me/open');
}
function tbResetTurn(){TB.dice=[1,1,1,1,1];TB.diceState=['free','free','free','free','free'];TB.turnScore=0;TB.phase='idle';TB.message='';TB.msgType='';TB.zegWurpClicked=false;TB.popup=null;}
function tbDoRoll(){const si=tbSelIdx();const{valid,score,instantWin}=evalSel(si,TB.dice);if(TB.phase==='thrown'&&!valid){TB.message='Selecteer eerst een geldige combinatie!';TB.msgType='warn';tbRender();return;}if(valid){TB.turnScore+=score;si.forEach(i=>TB.diceState[i]='used');if(instantWin){tbOpenRaad(TB.turnScore);return;}}if(TB.diceState.every(s=>s==='used')){TB.diceState=['free','free','free','free','free'];TB.message='Alle stenen scoren! Gooi opnieuw.';TB.msgType='info';}const toRoll=TB.diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);TB.zegWurpClicked=false;TB.phase='thrown';tbRender();const els=document.querySelectorAll('#tray .die');toRoll.forEach(i=>els[i]?.classList.add('rolling'));setTimeout(()=>{toRoll.forEach(i=>TB.dice[i]=Math.ceil(Math.random()*6));document.querySelectorAll('#tray .die.rolling').forEach(el=>el.classList.remove('rolling'));const fi=TB.diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);let c={};fi.forEach(i=>{const v=TB.dice[i];c[v]=(c[v]||0)+1;});const any=fi.some(i=>{const v=TB.dice[i];return v===1||v===5||(c[v]>=3);});if(!any){TB.turnScore=0;TB.phase='bust';tbRender();setTimeout(()=>{tbRegisterBust();TB.beurten[TB.currentIdx]++;const mx=Math.max(...TB.scores);const eq=TB.beurten.every(b=>b===TB.beurten[0]);if(mx>=TB.wurpDoel&&eq)tbCheckWinner();else tbNextPlayer();},1400);}else{TB.phase='thrown';TB.message='Klik op dobbelstenen om te selecteren.';TB.msgType='info';tbRender();}},420);}
function tbDoBank(){if(!TB.zegWurpClicked){TB.popup={type:'zegwurp'};TB.turnScore=0;TB.diceState=['free','free','free','free','free'];TB.phase='idle';TB.message='';TB.msgType='';tbRender();return;}const si=tbSelIdx();const{valid,score}=evalSel(si,TB.dice);if(valid)TB.turnScore+=score;if(TB.turnScore===0){tbEndTurn();return;}tbOpenRaad(TB.turnScore);}
function tbOpenRaad(echt){TB.popup={type:'raad',echt,opts:generateRaadOpties(echt)};tbRender();}
function tbHandleRaad(gok){const echt=TB.popup.echt;if(gok===echt){TB.scores[TB.currentIdx]+=echt;tbHistory.push({naam:TB.players[TB.currentIdx],score:echt});TB.popup=null;tbEndTurn();}else if(gok>echt){TB.popup={type:'loser',data:{echt,gok}};tbRender();}else{TB.scores[TB.currentIdx]+=gok;tbHistory.push({naam:TB.players[TB.currentIdx],score:gok});TB.popup={type:'sukkel',data:{gekregen:gok,gemist:echt-gok}};tbRender();}}
function tbRegisterBust(){tbHistory.push({naam:TB.players[TB.currentIdx],score:0});}
function tbEndTurn(){TB.beurten[TB.currentIdx]++;const maxScore=Math.max(...TB.scores);const allEqual=TB.beurten.every(b=>b===TB.beurten[0]);if(maxScore>=TB.wurpDoel&&allEqual)tbCheckWinner();else tbNextPlayer();}
function tbCheckWinner(){const maxScore=Math.max(...TB.scores);const tops=TB.scores.map((s,i)=>s===maxScore?i:-1).filter(i=>i>=0);if(tops.length===1)tbHandleWin(tops[0],false);else tbStartWurpOut(tops);}
function tbStartWurpOut(players){TB.woPlayers=players;TB.woCurrent=0;TB.woScores={};TB.woDice=[1,1,1,1,1];TB.woDiceState=['free','free','free','free','free'];TB.woTurnScore=0;TB.woPhase='idle';TB.woMessage='';TB.woMsgType='';TB.screen='wurpout';tbRender();}
function tbHandleWin(wi,fromWo){const tot=TB.players.length*TB.inzet;TB.players.forEach((_,i)=>{if(i===wi)TB.saldo[i]=(TB.saldo[i]||0)+tot-TB.inzet;else TB.saldo[i]=(TB.saldo[i]||0)-TB.inzet;});TB.geschiedenis.push({spel:TB.spelNummer,winnaar:TB.players[wi],inzet:TB.inzet});TB._winnerIdx=wi;TB._fromWurpOut=fromWo||false;TB._woWinnerScore=fromWo?(TB.woScores[wi]||0):null;TB.screen='winner';tbRender();launchConfetti();}
function tbNextPlayer(){TB.currentIdx=(TB.currentIdx+1)%TB.players.length;tbResetTurn();TB.message=`Wurpbeurt van ${TB.players[TB.currentIdx]}. Druk op Wurp nu!`;TB.msgType='info';tbRender();}
function tbDoWoRoll(){const si=tbWoSelIdx();const{valid,score}=evalSel(si,TB.woDice);if(TB.woPhase==='thrown'&&!valid){TB.woMessage='Selecteer eerst een geldige combinatie!';TB.woMsgType='warn';tbRender();return;}if(valid){TB.woTurnScore+=score;si.forEach(i=>TB.woDiceState[i]='used');}if(TB.woDiceState.every(s=>s==='used')){TB.woDiceState=['free','free','free','free','free'];TB.woMessage='Alle stenen scoren!';TB.woMsgType='info';}const toRoll=TB.woDiceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);TB.woPhase='thrown';tbRender();const els=document.querySelectorAll('#tray-out .die-out');toRoll.forEach(i=>els[i]?.classList.add('rolling'));setTimeout(()=>{toRoll.forEach(i=>TB.woDice[i]=Math.ceil(Math.random()*6));document.querySelectorAll('#tray-out .die-out.rolling').forEach(el=>el.classList.remove('rolling'));const fi=TB.woDiceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);let c={};fi.forEach(i=>{const v=TB.woDice[i];c[v]=(c[v]||0)+1;});const any=fi.some(i=>{const v=TB.woDice[i];return v===1||v===5||(c[v]>=3);});if(!any){TB.woTurnScore=0;const ci=TB.woPlayers[TB.woCurrent];TB.woScores[ci]=0;TB.woPhase='bust';TB.woMessage='Geen punten!';TB.woMsgType='warn';tbRender();setTimeout(()=>tbNextWoPlayer(),1400);}else{TB.woPhase='thrown';TB.woMessage='Selecteer stenen of druk WURP!';TB.woMsgType='info';tbRender();}},420);}
function tbDoWoBank(){const si=tbWoSelIdx();const{valid,score}=evalSel(si,TB.woDice);if(valid)TB.woTurnScore+=score;TB.woScores[TB.woPlayers[TB.woCurrent]]=TB.woTurnScore;tbNextWoPlayer();}
function tbNextWoPlayer(){TB.woCurrent++;if(TB.woCurrent<TB.woPlayers.length){TB.woDice=[1,1,1,1,1];TB.woDiceState=['free','free','free','free','free'];TB.woTurnScore=0;TB.woPhase='idle';TB.woMessage='';TB.woMsgType='';}tbRender();}

render();
</script>
</body>
</html>
