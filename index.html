*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:'Inter',sans-serif;color:#fff;background:linear-gradient(160deg,#0d2a6e 0%,#0a1f55 40%,#071540 100%)}
.page{max-width:480px;margin:0 auto;padding:1.25rem 1rem 3rem}

.btn-orange{background:linear-gradient(180deg,#ffb030,#e07000);color:#fff;box-shadow:0 4px 0 #904000,0 6px 16px rgba(200,100,0,.4),inset 0 1px 0 rgba(255,255,255,.3);text-shadow:0 1px 2px rgba(0,0,0,.3)}

.die-out.clickable-wo{cursor:pointer}
.die-out.clickable-wo:hover,.die-out.clickable-wo:active{transform:translateY(-4px);filter:brightness(1.2)}
.die-out.selected-wo{border-color:rgba(255,200,0,.9);transform:translateY(-7px);box-shadow:0 0 28px rgba(255,200,0,.5),0 4px 0 rgba(0,0,0,.4)}

.die-out.used-wo{opacity:.2;cursor:not-allowed;transform:none!important;box-shadow:none}
.die.rolling,.die-out.rolling{animation:roll .38s ease forwards}

.msg-bar{border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:.75rem;min-height:38px;display:flex;align-items:center;gap:8px}

.cpu-thinking{display:none}
.dot-anim span{display:inline-block;animation:blink 1.2s infinite}

.dot-anim span:nth-child(3){animation-delay:.4s}

.pts-card{background:linear-gradient(160deg,#1a4090,#0e2870);border-radius:16px;border:1.5px solid rgba(100,160,255,.2);padding:1.25rem;margin-top:1rem;box-shadow:0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.07)}
table.pts{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}

// ── Helpers ────────────────────────────────────
function calcScore(vals){let c={};vals.forEach(v=>c[v]=(c[v]||0)+1);let score=0,iwin=false;for(let v=1;v<=6;v++){const n=c[v]||0,base=v===1?1000:v*100;if(n>=5){if(v===1)iwin=true;score+=base*2;c[v]-=5;}else if(n===4){score+=Math.round(base*1.5);c[v]-=4;}else if(n>=3){score+=base;c[v]-=3;}}score+=(c[1]||0)*100+(c[5]||0)*50;return{score,instantWin:iwin};}
function evalSel(sel,dice){if(!sel||!sel.length)return{valid:false,score:0,instantWin:false};const vals=sel.map(i=>dice[i]);let c={};vals.forEach(v=>c[v]=(c[v]||0)+1);for(let v=2;v<=6;v++){if(v===5)continue;if((c[v]||0)>0&&c[v]<3)return{valid:false,score:0,instantWin:false};}const{score,instantWin}=calcScore(vals);return{valid:score>0,score,instantWin};}
function canSelect(idx,fi,dice){const v=dice[idx];if(v===1||v===5)return true;let c={};fi.forEach(i=>{const vi=dice[i];if(!c[vi])c[vi]=[];c[vi].push(i);});return(c[v]||[]).length>=3;}
function generateRaadOpties(echt){const pool=[-200,-150,-100,-50,50,100,150,200].sort(()=>Math.random()-.5);let w1=Math.max(0,echt+pool[0]),w2=Math.max(0,echt+pool[1]);if(w1===echt)w1+=50;if(w2===echt)w2-=50;if(w1===w2)w2+=100;return[echt,w1,w2].sort(()=>Math.random()-.5);}

function ptsHTML(){

  const c=v=>v==null?`<span class="none">—</span>`:`<span class="val">${v}</span>`;
  const rows=data.map(r=>`<tr><td>${r.f}</td><td>${c(r.s)}</td><td>${c(r.x3)}</td><td>${c(r.x4)}</td><td>${r.win?`<span class="win-pill">WINST</span>`:c(r.x5)}</td></tr>`).join('');
  return`<div class="pts-card"><div class="section-label" style="margin-bottom:.75rem">Puntenoverzicht</div><table class="pts"><thead><tr><th></th><th>1×</th><th>3×</th><th>4×</th><th>5×</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

      const s=col[r];const clr=s>0?'#ffd700':'#ff6644';const sh=s>0?'0 0 8px rgba(255,200,0,.3)':'none';

function launchConfetti(){

  const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;

  const pieces=Array.from({length:200},(_,i)=>({x:Math.random()*canvas.width,y:Math.random()*-300,isDie:i%3===0,emoji:diceE[Math.floor(Math.random()*6)],size:i%3===0?Math.random()*18+14:Math.random()*8+4,c:cols[Math.floor(Math.random()*cols.length)],s:Math.random()*3+1.5,vx:(Math.random()-.5)*2.5,rot:Math.random()*360,rotSpeed:(Math.random()-.5)*8}));
  let f=0;function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);p.rot+=p.rotSpeed;ctx.rotate(p.rot*Math.PI/180);if(p.isDie){ctx.font=`${p.size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=.9;ctx.fillText(p.emoji,0,0);}else{ctx.fillStyle=p.c;ctx.globalAlpha=.85;ctx.beginPath();ctx.arc(0,0,p.size,0,Math.PI*2);ctx.fill();}ctx.restore();p.y+=p.s;p.x+=p.vx;});if(f++<280)requestAnimationFrame(draw);else{ctx.clearRect(0,0,canvas.width,canvas.height);delete canvas.dataset.running;}}draw();
}

// ── Screenshot (download als PNG via canvas) ──
function takeScreenshot(data,title){
  const canvas=document.createElement('canvas');
  const scale=2;canvas.width=400*scale;canvas.height=(60+data.length*44+40)*scale;
  const ctx=canvas.getContext('2d');ctx.scale(scale,scale);
  const W=400,rows=data.length;
  // achtergrond
  const bg=ctx.createLinearGradient(0,0,0,canvas.height/scale);
  bg.addColorStop(0,'#1e4aa0');bg.addColorStop(1,'#0e2870');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,canvas.height/scale);
  // border
  ctx.strokeStyle='rgba(255,200,0,.5)';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(8,8,W-16,canvas.height/scale-16,14);ctx.stroke();
  // titel
  ctx.font='bold 13px Inter,Arial,sans-serif';ctx.fillStyle='rgba(255,200,0,.7)';ctx.letterSpacing='2px';
  ctx.fillText(title.toUpperCase(),24,40);
  // rijen
  data.forEach((row,i)=>{
    const y=60+i*44;
    if(i%2===0){ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(16,y,W-32,40);}
    ctx.font='600 15px Inter,Arial,sans-serif';ctx.fillStyle='rgba(255,255,255,.75)';ctx.textAlign='left';
    ctx.fillText(row.naam,24,y+26);
    const isPos=row.score>0;const isNeg=row.score<0;
    ctx.font='bold 18px Inter,Arial,sans-serif';
    ctx.fillStyle=isPos?'#ffd700':isNeg?'#ff6644':'rgba(255,255,255,.6)';
    ctx.textAlign='right';
    ctx.fillText((isPos?'+':'')+row.score,W-24,y+27);
    if(i<data.length-1){ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(16,y+40);ctx.lineTo(W-16,y+40);ctx.stroke();}
  });
  // footer
  ctx.font='11px Inter,Arial,sans-serif';ctx.fillStyle='rgba(255,255,255,.15)';ctx.textAlign='right';
  ctx.fillText('WURPEN',W-24,canvas.height/scale-18);
  // download
  const link=document.createElement('a');link.download='blockchain.png';link.href=canvas.toDataURL('image/png');link.click();
}

function spInitial(){spHistory.length=0;return{screen:'setup',playerName:'',playerScore:0,cpuScore:0,playerBeurten:0,cpuBeurten:0,isPlayerTurn:true,dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',message:'',msgType:'',popup:null,zegWurpClicked:false,wurpDoel:5000,spelNummer:1,cpuThinking:false,cpuMsg:'',_winner:null,cpuDice:[1,1,1,1,1],cpuDiceState:['free','free','free','free','free'],cpuTurnScore:0,cpuTotalHeld:0,showCpuDice:false,playerWins:0,cpuWins:0};}
function spResetForNewGame(){spHistory.length=0;}
let SP=spInitial();
function spSelIdx(){return SP.diceState.map((s,i)=>s==='selected'?i:-1).filter(i=>i>=0);}

function getScoringGroups(freeIdxs,dice){let c={};freeIdxs.forEach(i=>{const v=dice[i];if(!c[v])c[v]=[];c[v].push(i);});let groups=[];for(let v=1;v<=6;v++){const g=c[v]||[],base=v===1?1000:v*100;if(g.length>=5)groups.push({indices:g.slice(0,5),score:base*2});else if(g.length===4)groups.push({indices:g.slice(0,4),score:Math.round(base*1.5)});else if(g.length>=3)groups.push({indices:g.slice(0,3),score:base});const rest=g.length>=3?g.slice(3):g;if(v===1)rest.forEach(i=>groups.push({indices:[i],score:100}));if(v===5)rest.forEach(i=>groups.push({indices:[i],score:50}));}return groups;}

function cpuDecide(dice,diceState,turnScore,cpuScore,playerScore,wurpDoel,totalScoringHeld){
  const freeIdxs=diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);
  const groups=getScoringGroups(freeIdxs,dice);if(!groups.length)return{select:[],stop:true};
  const sel=[...new Set(groups.flatMap(g=>g.indices))];
  const addedScore=calcScore(sel.map(i=>dice[i])).score;const total=turnScore+addedScore;
  const projectedCpuScore=cpuScore+total;const vrijNaSelectie=freeIdxs.length-sel.length;
  const newTotalHeld=(totalScoringHeld||0)+sel.length;
  if(newTotalHeld<3)return{select:sel,stop:false};
  if(playerScore>=wurpDoel){if(projectedCpuScore>playerScore)return{select:sel,stop:true};return{select:sel,stop:false};}
  if(vrijNaSelectie===0)return{select:sel,stop:false};
  if(vrijNaSelectie>=4)return{select:sel,stop:false};
  if(total<150)return{select:sel,stop:false};
  const achterstand=playerScore-cpuScore;
  if(achterstand>1000&&total<700)return{select:sel,stop:false};
  if(achterstand>800&&total<500)return{select:sel,stop:false};
  return{select:sel,stop:true};
}

function spCpuTurn(){SP.cpuDice=[1,1,1,1,1];SP.cpuDiceState=['free','free','free','free','free'];SP.cpuTurnScore=0;SP.cpuTotalHeld=0;SP.showCpuDice=true;SP.cpuThinking=true;SP.cpuMsg='💻 Computer is aan het wurpen...';spRender();setTimeout(()=>spCpuRollStep(),800);}
function spCpuRollStep(){
  const toRoll=SP.cpuDiceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);
  if(!toRoll.length){spEndCpuTurn(SP.cpuTurnScore);return;}spRender();
  const els=document.querySelectorAll('#cpu-tray .die');toRoll.forEach(i=>els[i]?.classList.add('rolling'));
  setTimeout(()=>{
    toRoll.forEach(i=>SP.cpuDice[i]=Math.ceil(Math.random()*6));
    document.querySelectorAll('#cpu-tray .die.rolling').forEach(el=>el.classList.remove('rolling'));
    const fi=SP.cpuDiceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);
    let c={};fi.forEach(i=>{const v=SP.cpuDice[i];c[v]=(c[v]||0)+1;});
    const anyScore=fi.some(i=>{const v=SP.cpuDice[i];return v===1||v===5||(c[v]>=3);});
    if(!anyScore){SP.cpuTurnScore=0;SP.cpuThinking=false;spRender();setTimeout(()=>spEndCpuTurn(0),1200);return;}
    let{select,stop}=cpuDecide(SP.cpuDice,SP.cpuDiceState,SP.cpuTurnScore,SP.cpuScore,SP.playerScore,SP.wurpDoel,SP.cpuTotalHeld);
    select.forEach(i=>SP.cpuDiceState[i]='selected');
    const selScore=calcScore(select.map(i=>SP.cpuDice[i])).score;SP.cpuTurnScore+=selScore;SP.cpuTotalHeld=(SP.cpuTotalHeld||0)+select.length;
    if(stop){SP.cpuMsg=`💻 Computer stopt met ${SP.cpuTurnScore} punten.`;SP.cpuThinking=false;spRender();setTimeout(()=>spEndCpuTurn(SP.cpuTurnScore),1200);}
    else{select.forEach(i=>SP.cpuDiceState[i]='used');if(SP.cpuDiceState.every(s=>s==='used')){SP.cpuDiceState=['free','free','free','free','free'];SP.cpuTotalHeld=0;SP.cpuMsg=`💻 Alle stenen scoren! Computer gooit opnieuw (+${selScore}).`;}else SP.cpuMsg=`💻 Computer kiest +${selScore} en gooit verder...`;spRender();setTimeout(()=>spCpuRollStep(),900);}
  },420);
}
function spEndCpuTurn(scored){SP.cpuScore+=scored;SP.cpuBeurten++;spHistory.push({naam:'💻 Computer',score:scored});SP.showCpuDice=false;SP.cpuThinking=false;spCheckWinner('cpu');}
function spCheckWinner(who){
  const maxScore=Math.max(SP.playerScore,SP.cpuScore);const allEqual=SP.playerBeurten===SP.cpuBeurten;
  if(maxScore>=SP.wurpDoel&&allEqual){
    if(SP.playerScore>SP.cpuScore){SP._winner='player';SP.playerWins++;}
    else if(SP.cpuScore>SP.playerScore){SP._winner='cpu';SP.cpuWins++;}
    else SP._winner='draw';
    SP.screen='winner';spRender();launchConfetti();
  }else{
    if(who==='player'){SP.isPlayerTurn=false;SP.message='';SP.msgType='';spRender();setTimeout(()=>spCpuTurn(),600);}
    else{SP.isPlayerTurn=true;SP.message='Jouw beurt! Druk op Wurp nu!';SP.msgType='info';spResetPlayerTurn();spRender();}
  }
}
function spResetPlayerTurn(){SP.dice=[1,1,1,1,1];SP.diceState=['free','free','free','free','free'];SP.turnScore=0;SP.phase='idle';SP.message='';SP.msgType='';SP.zegWurpClicked=false;SP.popup=null;}
function spDoRoll(){
  const si=spSelIdx();const{valid,score,instantWin}=evalSel(si,SP.dice);
  if(SP.phase==='thrown'&&!valid){SP.message='Selecteer eerst een geldige combinatie!';SP.msgType='warn';spRender();return;}
  if(valid){SP.turnScore+=score;si.forEach(i=>SP.diceState[i]='used');if(instantWin){spOpenRaad(SP.turnScore);return;}}
  if(SP.diceState.every(s=>s==='used')){SP.diceState=['free','free','free','free','free'];SP.message='Alle stenen scoren! Gooi opnieuw.';SP.msgType='info';}
  const toRoll=SP.diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);SP.zegWurpClicked=false;SP.phase='thrown';spRender();
  const els=document.querySelectorAll('#tray .die');toRoll.forEach(i=>els[i]?.classList.add('rolling'));
  setTimeout(()=>{toRoll.forEach(i=>SP.dice[i]=Math.ceil(Math.random()*6));document.querySelectorAll('#tray .die.rolling').forEach(el=>el.classList.remove('rolling'));const fi=SP.diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);let c={};fi.forEach(i=>{const v=SP.dice[i];c[v]=(c[v]||0)+1;});const any=fi.some(i=>{const v=SP.dice[i];return v===1||v===5||(c[v]>=3);});  // bust: registreer 0 punten
  if(!any){SP.turnScore=0;SP.phase='bust';spRender();setTimeout(()=>{spHistory.push({naam:SP.playerName,score:0});SP.playerBeurten++;spCheckWinner('player');},1400);}else{SP.phase='thrown';SP.message='Klik op dobbelstenen om te selecteren.';SP.msgType='info';spRender();}},420);
}
function spDoBank(){if(!SP.zegWurpClicked){SP.popup={type:'zegwurp'};SP.turnScore=0;SP.diceState=['free','free','free','free','free'];SP.phase='idle';SP.message='';SP.msgType='';spRender();return;}const si=spSelIdx();const{valid,score}=evalSel(si,SP.dice);if(valid)SP.turnScore+=score;if(SP.turnScore===0){spEndPlayerTurn();return;}spOpenRaad(SP.turnScore);}
function spOpenRaad(echt){SP.popup={type:'raad',echt,opts:generateRaadOpties(echt)};spRender();}
function spHandleRaad(gok){const echt=SP.popup.echt;if(gok===echt){SP.playerScore+=echt;spHistory.push({naam:SP.playerName,score:echt});SP.popup=null;spEndPlayerTurn();}else if(gok>echt){SP.popup={type:'loser',data:{echt,gok}};spRender();}else{SP.playerScore+=gok;spHistory.push({naam:SP.playerName,score:gok});SP.popup={type:'sukkel',data:{gekregen:gok,gemist:echt-gok}};spRender();}}

  let diceHTML=woDice.map((v,i)=>{let cls='die-out';if(woDs[i]==='used')cls+=' used-wo';else if(woDs[i]==='selected')cls+=' selected-wo';else if(woPhase==='thrown'&&isMyWoTurn)cls+=' clickable-wo';return`<div class="${cls}" data-wodie="${i}">${FACES[v-1]}</div>`;}).join('');
  let content='';if(!allDone){content=`<div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem">Beurt van: <span style="color:#ffd700;font-size:16px;font-family:'Oswald',sans-serif">${curWoName}</span></div><div class="tray-out-wrap"><div class="tray-out-outer"><div class="tray-out-rim"><div class="tray-out" id="tray-out">${diceHTML}</div></div></div></div><div class="msg-bar ${mpG.woMsgType||'muted'}">${mpG.woMessage||'&nbsp;'}</div>${isMyWoTurn?`<div class="btn-row"><button class="btn btn-blue" id="wo-roll-btn" ${!canWoRoll?'disabled':''}>🎲 Gooi!</button><button class="btn btn-orange" id="wo-bank-btn" ${!canWoBank?'disabled':''}>💰 WURP!</button></div>`:`<div class="spectator-msg">Wachten op <strong>${curWoName}</strong>...</div>`}`;}
  else{const maxWo=Math.max(...woPlayers.map(id=>woScores[id]||0));const winners=woPlayers.filter(id=>(woScores[id]||0)===maxWo);const isHost=mpG.hostId===mpMyId;content=winners.length===1?`<p style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:1rem">🏆 <strong style="color:#ffd700">${players.find(p=>p.id===winners[0])?.name}</strong> wint de Wurp Out met <strong style="color:#ffd700">${maxWo}</strong> punten!</p>${isHost?`<button class="btn btn-orange btn-full" id="wo-finish">Bekijk eindstand</button>`:''}`:`<p style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:1rem">Nog steeds gelijk!</p>${isHost?`<button class="btn btn-orange btn-full" id="wo-again">Opnieuw Wurp Out</button>`:''}`;}
  return`${backBtn()}<div class="title-bar">WURPEN</div><div class="panel" style="border-color:rgba(255,200,0,.25)"><div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:3px;color:#ffd700;text-align:center;margin-bottom:.5rem">⚡ WURP OUT!</div><p style="font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:1rem">Gelijkspel! Elke speler gooit een beurt.</p><div style="margin-bottom:1rem">${woRows}</div>${content}</div>${scoreHistHTML(mpHistory)}`;}

  document.getElementById('bank-btn')?.addEventListener('click',mpDoBank);

  document.querySelectorAll('[data-raad]').forEach(btn=>btn.addEventListener('click',e=>mpHandleRaad(+e.currentTarget.dataset.raad)));
  document.querySelectorAll('.die').forEach(d=>{const h=e=>{e.preventDefault();if(mpG?.phase!=='thrown')return;const i=+d.dataset.die;const ds=[...(mpG.diceState||['free','free','free','free','free'])];if(ds[i]==='used')return;const fi=ds.map((s,j)=>s==='free'||s==='selected'?j:-1).filter(j=>j>=0);if(ds[i]==='selected')ds[i]='free';else if(canSelect(i,fi,mpG.dice||[]))ds[i]='selected';else{mpUpd('',{message:'Deze steen scoort niet alleen.',msgType:'hint'});return;}mpUpd('diceState',ds);};d.addEventListener('click',h);d.addEventListener('touchend',h,{passive:false});});
  document.querySelectorAll('.die-out').forEach(d=>{const h=e=>{e.preventDefault();if(mpG?.woPhase!=='thrown')return;const i=+d.dataset.wodie;const ds=[...(mpG.woDiceState||['free','free','free','free','free'])];const fi=ds.map((s,j)=>s==='free'||s==='selected'?j:-1).filter(j=>j>=0);if(ds[i]==='selected')ds[i]='free';else if(canSelect(i,fi,mpG.woDice||[]))ds[i]='selected';else{mpUpd('',{woMessage:'Deze steen scoort niet alleen.',woMsgType:'hint'});return;}mpUpd('woDiceState',ds);};d.addEventListener('click',h);d.addEventListener('touchend',h,{passive:false});});
  document.getElementById('wo-roll-btn')?.addEventListener('click',mpDoWoRoll);
  document.getElementById('wo-bank-btn')?.addEventListener('click',mpDoWoBank);
  document.getElementById('wo-finish')?.addEventListener('click',mpWoFinish);

  document.getElementById('mp-screenshot')?.addEventListener('click',()=>takeScreenshot(mpBlockchainData(),'De Blockchain'));
  document.getElementById('btn-tikkie')?.addEventListener('click',()=>window.open('https://tikkie.me/pay/','_blank'));
}

async function mpCreateGame(){const name=(document.getElementById('my-name')?.value||'').trim();if(!name){alert('Vul je naam in.');return;}mpMyName=name;mpMyId=mpUid();mpGameId=mpCode();const init={code:mpGameId,hostId:mpMyId,screen:'lobby',wurpDoel:5000,inzet:10,spelNummer:1,players:{[mpMyId]:{id:mpMyId,name}},scores:{},beurten:{},saldo:{},geschiedenis:[],currentIdx:0,playerOrder:[],dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',message:'',msgType:'',zegWurpClicked:false,popup:null,woDice:[1,1,1,1,1],woDiceState:['free','free','free','free','free'],woTurnScore:0,woPhase:'idle',woMessage:'',woMsgType:'',woPlayers:[],woCurrent:0,woScores:{},winnerIdx:null,fromWurpOut:false,woWinnerScore:null};await set(mpGr(''),init);mpSubscribe();}
async function mpJoinGame(){const name=(document.getElementById('my-name')?.value||'').trim();const c=(document.getElementById('join-code')?.value||'').trim();if(!name){alert('Vul je naam in.');return;}if(!c){alert('Vul een spelcode in.');return;}const snap=await get(ref(db,`games/${c}`));if(!snap.exists()){alert('Spelcode niet gevonden!');return;}mpMyName=name;mpMyId=mpUid();mpGameId=c;await mpUpd(`players/${mpMyId}`,{id:mpMyId,name});mpSubscribe();}
function mpSubscribe(){if(mpUnsub)mpUnsub();mpHistory.length=0;mpUnsub=onValue(mpGr(''),snap=>{mpG=snap.val();mpRender();if(mpG?.screen==='winner')launchConfetti();});}
async function mpStartGame(){const players=Object.values(mpG.players||{});const order=players.map(p=>p.id).sort(()=>Math.random()-.5);const scores={},beurten={},saldo={};players.forEach(p=>{scores[p.id]=0;beurten[p.id]=0;saldo[p.id]=mpG.saldo?.[p.id]||0;});const doel=parseInt(document.getElementById('wurp-doel-input')?.value||5000);const firstName=players.find(p=>p.id===order[0])?.name||'?';await mpUpd('',{screen:'game',playerOrder:order,currentIdx:0,scores,beurten,saldo,spelNummer:mpG.spelNummer||1,wurpDoel:isNaN(doel)||doel<100?5000:doel,dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',zegWurpClicked:false,popup:null,message:`${firstName}, druk op Wurp nu!`,msgType:'info'});}
async function mpStartVolgend(){const players=Object.values(mpG.players||{});const order=(mpG.playerOrder||[]).sort(()=>Math.random()-.5);const scores={},beurten={};players.forEach(p=>{scores[p.id]=0;beurten[p.id]=0;});const sn=(mpG.spelNummer||1)+1;await mpUpd('',{screen:'game',spelNummer:sn,playerOrder:order,currentIdx:0,scores,beurten,dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',zegWurpClicked:false,popup:null,message:`Spel ${sn} — druk op Wurp nu!`,msgType:'info'});}
async function mpDoRoll(){const dice=[...(mpG.dice||[1,1,1,1,1])];const ds=[...(mpG.diceState||['free','free','free','free','free'])];const si=mpSelIdx(ds);const{valid,score,instantWin}=evalSel(si,dice);if(mpG.phase==='thrown'&&!valid){await mpUpd('',{message:'Selecteer eerst een geldige combinatie!',msgType:'warn'});return;}let ts=mpG.turnScore||0;if(valid){ts+=score;si.forEach(i=>ds[i]='used');if(instantWin){await mpOpenRaad(ts,ds);return;}}if(ds.every(s=>s==='used'))ds.fill('free');const toRoll=ds.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);const nd=[...dice];toRoll.forEach(i=>nd[i]=Math.ceil(Math.random()*6));const fi=ds.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);let c={};fi.forEach(i=>{const v=nd[i];c[v]=(c[v]||0)+1;});const any=fi.some(i=>{const v=nd[i];return v===1||v===5||(c[v]>=3);});if(!any){await mpUpd('',{dice:nd,diceState:ds,turnScore:0,phase:'bust',zegWurpClicked:false,popup:null,message:'Geen punten! Beurt voorbij.',msgType:'warn'});setTimeout(()=>mpEndTurn(),1400);}else await mpUpd('',{dice:nd,diceState:ds,turnScore:ts,phase:'thrown',zegWurpClicked:false,popup:null,message:'Klik op dobbelstenen om te selecteren.',msgType:'info'});}
async function mpDoBank(){if(!mpG.zegWurpClicked){await mpUpd('',{popup:{type:'zegwurp',playerId:mpMyId},turnScore:0,diceState:['free','free','free','free','free'],phase:'idle',message:'',msgType:''});return;}const si=mpSelIdx(mpG.diceState);const{valid,score}=evalSel(si,mpG.dice||[]);const ts=(mpG.turnScore||0)+(valid?score:0);if(ts===0){mpEndTurn();return;}await mpOpenRaad(ts,mpG.diceState);}
async function mpOpenRaad(echt,ds){const opts=generateRaadOpties(echt);await mpUpd('',{popup:{type:'raad',playerId:mpMyId,echt,opts},turnScore:echt,...(ds?{diceState:ds}:{})});}
async function mpHandleRaad(gok){const echt=mpG.popup.echt;const order=mpG.playerOrder||[];const curId=order[mpG.currentIdx||0];const scores={...(mpG.scores||{})};const curName=Object.values(mpG.players||{}).find(p=>p.id===curId)?.name||'?';if(gok===echt){scores[curId]=(scores[curId]||0)+echt;mpHistory.push({naam:curName,score:echt});await mpUpd('',{scores,popup:null});mpEndTurn();}else if(gok>echt){await mpUpd('popup',{type:'loser',playerId:mpMyId,echt,gok});}else{const gemist=echt-gok;scores[curId]=(scores[curId]||0)+gok;mpHistory.push({naam:curName,score:gok});await mpUpd('',{scores,popup:{type:'sukkel',playerId:mpMyId,gekregen:gok,gemist}});}}
async function mpEndTurn(){const order=mpG.playerOrder||[];const beurten={...(mpG.beurten||{})};const curId=order[mpG.currentIdx||0];beurten[curId]=(beurten[curId]||0)+1;const scores=mpG.scores||{};const maxScore=Math.max(...Object.values(scores).map(Number));const allEqual=order.every(id=>beurten[id]===beurten[order[0]]);if(maxScore>=(mpG.wurpDoel||5000)&&allEqual)await mpCheckWinner(beurten,scores,order);else{const nextIdx=((mpG.currentIdx||0)+1)%order.length;const nextName=Object.values(mpG.players||{}).find(p=>p.id===order[nextIdx])?.name||'?';await mpUpd('',{beurten,currentIdx:nextIdx,dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',zegWurpClicked:false,popup:null,message:`Wurpbeurt van ${nextName}. Druk op Wurp nu!`,msgType:'info'});}}
async function mpCheckWinner(beurten,scores,order){const maxScore=Math.max(...Object.values(scores).map(Number));const tops=order.filter(id=>(scores[id]||0)===maxScore);if(tops.length===1)await mpDoWin(tops[0],false,null);else await mpUpd('',{screen:'wurpout',woPlayers:tops,woCurrent:0,woScores:{},woDice:[1,1,1,1,1],woDiceState:['free','free','free','free','free'],woTurnScore:0,woPhase:'idle',woMessage:'',woMsgType:'',beurten});}
async function mpDoWin(wi,fromWo,woScore){const players=Object.values(mpG.players||{});const inzet=mpG.inzet||10,tot=players.length*inzet;const saldo={...(mpG.saldo||{})};players.forEach(p=>{saldo[p.id]=(saldo[p.id]||0)+(p.id===wi?tot-inzet:-inzet);});const ges=[...(mpG.geschiedenis||[]),{spel:mpG.spelNummer||1,winnaar:players.find(p=>p.id===wi)?.name||'?',inzet}];await mpUpd('',{screen:'winner',winnerIdx:wi,fromWurpOut:fromWo,woWinnerScore:woScore,saldo,geschiedenis:ges});}
async function mpDoWoRoll(){const woDice=[...(mpG.woDice||[1,1,1,1,1])];const woDs=[...(mpG.woDiceState||['free','free','free','free','free'])];const si=mpSelIdx(woDs);const{valid,score}=evalSel(si,woDice);if(mpG.woPhase==='thrown'&&!valid){await mpUpd('',{woMessage:'Selecteer eerst een geldige combinatie!',woMsgType:'warn'});return;}let ts=mpG.woTurnScore||0;if(valid){ts+=score;si.forEach(i=>woDs[i]='used');}if(woDs.every(s=>s==='used'))woDs.fill('free');const toRoll=woDs.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);const nd=[...woDice];toRoll.forEach(i=>nd[i]=Math.ceil(Math.random()*6));const fi=woDs.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);let c={};fi.forEach(i=>{const v=nd[i];c[v]=(c[v]||0)+1;});const any=fi.some(i=>{const v=nd[i];return v===1||v===5||(c[v]>=3);});const curId=(mpG.woPlayers||[])[mpG.woCurrent||0];if(!any){const woScores={...(mpG.woScores||{}),[curId]:0};await mpUpd('',{woDice:nd,woDiceState:woDs,woTurnScore:0,woPhase:'bust',woScores,woMessage:'Geen punten! 0 punten.',woMsgType:'warn'});setTimeout(()=>mpNextWoPlayer(),1400);}else await mpUpd('',{woDice:nd,woDiceState:woDs,woTurnScore:ts,woPhase:'thrown',woMessage:'Selecteer stenen of druk WURP!',woMsgType:'info'});}
async function mpDoWoBank(){const si=mpSelIdx(mpG.woDiceState);const{valid,score}=evalSel(si,mpG.woDice||[]);const ts=(mpG.woTurnScore||0)+(valid?score:0);const curId=(mpG.woPlayers||[])[mpG.woCurrent||0];await mpUpd('',{woScores:{...(mpG.woScores||{}),[curId]:ts}});mpNextWoPlayer();}
async function mpNextWoPlayer(){const next=(mpG.woCurrent||0)+1;if(next<(mpG.woPlayers||[]).length)await mpUpd('',{woCurrent:next,woDice:[1,1,1,1,1],woDiceState:['free','free','free','free','free'],woTurnScore:0,woPhase:'idle',woMessage:'',woMsgType:''});else await mpUpd('woCurrent',next);}
async function mpWoFinish(){const woScores=mpG.woScores||{};const maxWo=Math.max(...(mpG.woPlayers||[]).map(id=>woScores[id]||0));await mpDoWin((mpG.woPlayers||[]).find(id=>(woScores[id]||0)===maxWo),true,maxWo);}
async function mpWoAgain(){const woScores=mpG.woScores||{};const maxWo=Math.max(...(mpG.woPlayers||[]).map(id=>woScores[id]||0));const tied=(mpG.woPlayers||[]).filter(id=>(woScores[id]||0)===maxWo);await mpUpd('',{woPlayers:tied,woCurrent:0,woScores:{},woDice:[1,1,1,1,1],woDiceState:['free','free','free','free','free'],woTurnScore:0,woPhase:'idle',woMessage:'',woMsgType:''});}

function tbInitial(){tbHistory.length=0;return{screen:'setup',players:[],scores:[],beurten:[],currentIdx:0,dice:[1,1,1,1,1],diceState:['free','free','free','free','free'],turnScore:0,phase:'idle',message:'',msgType:'',popup:null,zegWurpClicked:false,wurpDoel:5000,inzet:10,saldo:[],geschiedenis:[],spelNummer:1,woPlayers:[],woCurrent:0,woScores:{},woDice:[1,1,1,1,1],woDiceState:['free','free','free','free','free'],woTurnScore:0,woPhase:'idle',woMessage:'',woMsgType:'',_winnerIdx:undefined,_fromWurpOut:false,_woWinnerScore:null};}

  if(p.type==='zegwurp')return`<div class="popup-overlay"><div class="popup-box"><div class="popup-title">SUKKEL!</div><p class="popup-sub">Je vergat eerst op "ZEG WURP!" te klikken.</p><button class="btn btn-orange" id="close-popup">Oké...</button></div></div>`;

function tbRender(){document.getElementById('app').innerHTML=TB.screen==='setup'?tbSetupHTML():TB.screen==='inzet'?tbInzetHTML():TB.screen==='game'?tbGameHTML():TB.screen==='wurpout'?tbWurpOutHTML():tbWinnerHTML();tbBindEvents();}

function tbSetupHTML(){let rows=TB.players.map((p,i)=>`<div class="player-row"><input class="inp" type="text" value="${p}" placeholder="Naam ${i+1}" data-idx="${i}"><button class="icon-btn" data-del="${i}">✕</button></div>`).join('');
  return`${backBtn()}<div class="panel"><div class="title-bar">WURPEN</div><div class="title-sub">Speel samen op een scherm</div><div class="section-label">Namen (2–10)</div>${rows}${TB.players.length<10?`<button class="text-btn" id="add-player">+ Naam toevoegen</button>`:''}<div class="section-label" style="margin-top:.75rem">Wurpdoel</div><input class="inp" type="number" id="wurp-doel-input" value="${TB.wurpDoel}" min="100" style="margin-bottom:1rem"><div class="section-label">Inzet per speler</div><div id="inzet-row" style="display:flex;gap:8px;margin-bottom:1.25rem">${[10,20,50].map(v=>`<button class="btn ${TB.inzet===v?'btn-orange':'btn-blue'}" data-inzet="${v}" style="flex:1">€${v}</button>`).join('')}</div><button class="btn btn-orange btn-full" id="start-game" ${TB.players.filter(p=>p.trim()).length<2?'disabled':''}>Start met wurpen!</button></div>${scoreHistHTML(tbHistory)}`;}

function tbInzetHTML(){return`${backBtn()}<div class="panel"><div class="title-bar">WURPEN</div><p style="font-size:13px;color:rgba(255,255,255,.35);margin-bottom:1rem">Inzet aanpassen voor spel ${TB.spelNummer+1}.</p><div id="inzet-row" style="display:flex;gap:8px;margin-bottom:1.5rem">${[10,20,50].map(v=>`<button class="btn ${TB.inzet===v?'btn-orange':'btn-blue'}" data-inzet="${v}" style="flex:1">€${v}</button>`).join('')}</div><button class="btn btn-orange btn-full" id="start-volgend">Spel ${TB.spelNummer+1} starten!</button></div>`;}

function tbGameHTML(){
  const p=TB.players[TB.currentIdx];const si=tbSelIdx();const{valid}=evalSel(si,TB.dice);
  let pills=TB.players.map((pl,i)=>`<div class="score-pill ${i===TB.currentIdx?'active':''}"><div class="pname">${pl}</div><div class="ppts">${TB.scores[i]}</div></div>`).join('');
  let diceHTML=TB.dice.map((v,i)=>{const ds=TB.diceState[i];let cls='die';if(ds==='used')cls+=' used';else if(ds==='selected')cls+=' selected';else if(TB.phase==='thrown')cls+=' clickable';return`<div class="${cls}" data-die="${i}">${FACES[v-1]}</div>`;}).join('');
  const canRoll=(TB.phase==='idle'||(TB.phase==='thrown'&&valid))&&!TB.zegWurpClicked;const canBank=TB.turnScore>0||(TB.phase==='thrown'&&valid);const incomplete=TB.phase==='thrown'&&si.length>0&&!valid;
  let saldoBlock='';if(TB.geschiedenis.length>0){let rows=TB.players.map((pl,i)=>{const s=TB.saldo[i]||0;return`<div class="saldo-row"><span class="sname">${pl}</span><span class="sval ${s>=0?'pos':'neg'}">${s>=0?'+':''}€${s}</span></div>`;}).join('');saldoBlock=`<div class="saldo-card"><div class="section-label" style="margin-bottom:.5rem">De Blockchain</div>${rows}</div>`;}
  return`${tbPopupHTML()}${backBtn()}<div class="title-bar">WURPEN</div><div class="scoreboard">${pills}</div>
  <div style="display:flex;gap:.75rem;align-items:stretch;margin-bottom:1rem">
    <div class="info-bar red-bar" style="min-width:100px;flex:0 0 auto"><div class="bar-label">Wurpdoel</div><div class="bar-val">${TB.wurpDoel.toLocaleString('nl')}</div></div>
    <div class="info-bar" style="flex:1"><div><div class="bar-label">Beurt van</div><div class="bar-val" style="font-size:18px">${p}</div></div><div style="text-align:right"><div class="bar-label">Inzet·Pot</div><div class="bar-val" style="font-size:16px">€${TB.inzet}·€${TB.players.length*TB.inzet}</div></div></div>
  </div>
  <div class="tray-wrap"><div class="tray-outer"><div class="tray-rim"><div class="tray" id="tray">${diceHTML}</div></div></div></div>
  <div class="msg-bar hint" style="visibility:${incomplete?'visible':'hidden'}">⚠ Selecteer een volledige combinatie.</div>
  <div class="msg-bar ${TB.msgType||'info'}" style="visibility:${TB.message&&TB.msgType&&TB.msgType!=='muted'?'visible':'hidden'}">${TB.message||'&nbsp;'}</div>
  <div class="btn-row">
    <button class="btn btn-orange" id="zeg-wurp-btn" ${!canBank||TB.zegWurpClicked?'disabled':''} style="${TB.zegWurpClicked?'opacity:.3;cursor:not-allowed':''}">📢 ZEG WURP!</button>
    <button class="btn btn-blue" id="roll-btn" ${!canRoll?'disabled':''}>🎲 Wurp nu!</button>
    <button class="btn btn-orange" id="bank-btn" ${!canBank?'disabled':''}>💰 WURP!</button>
  </div>
  ${saldoBlock}${scoreHistHTML(tbHistory)}`;}

function tbWurpOutHTML(){
  const allDone=TB.woCurrent>=TB.woPlayers.length;const curIdx=!allDone?TB.woPlayers[TB.woCurrent]:-1;const curName=!allDone?TB.players[curIdx]:'';
  let woRows=TB.woPlayers.map(idx=>{const sc=TB.woScores[idx];const done=sc!==undefined;return`<div class="saldo-row"><span class="sname">${TB.players[idx]}</span><span class="sval ${done?(sc>0?'pos':'neg'):'neg'}">${done?sc+'pt':'—'}</span></div>`;}).join('');
  let content='';if(!allDone){const wsi=tbWoSelIdx();const{valid:wValid}=evalSel(wsi,TB.woDice);const canWoRoll=TB.woPhase==='idle'||(TB.woPhase==='thrown'&&wValid);const canWoBank=TB.woTurnScore>0||(TB.woPhase==='thrown'&&wValid);let diceHTML=TB.woDice.map((v,i)=>{const ds=TB.woDiceState[i];let cls='die-out';if(ds==='used')cls+=' used-wo';else if(ds==='selected')cls+=' selected-wo';else if(TB.woPhase==='thrown')cls+=' clickable-wo';return`<div class="${cls}" data-wodie="${i}">${FACES[v-1]}</div>`;}).join('');content=`<div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem">Beurt van: <span style="color:#ffd700;font-size:16px;font-family:'Oswald',sans-serif">${curName}</span></div><div class="tray-out-wrap"><div class="tray-out-outer"><div class="tray-out-rim"><div class="tray-out" id="tray-out">${diceHTML}</div></div></div></div><div class="msg-bar ${TB.woMsgType||'muted'}">${TB.woMessage||'&nbsp;'}</div><div class="btn-row"><button class="btn btn-blue" id="wo-roll-btn" ${!canWoRoll?'disabled':''}>🎲 Gooi!</button><button class="btn btn-orange" id="wo-bank-btn" ${!canWoBank?'disabled':''}>💰 WURP!</button></div>`;}
  else{const maxWo=Math.max(...TB.woPlayers.map(i=>TB.woScores[i]||0));const winners=TB.woPlayers.filter(i=>(TB.woScores[i]||0)===maxWo);if(winners.length===1)content=`<p style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:1rem">🏆 <strong style="color:#ffd700">${TB.players[winners[0]]}</strong> wint de Wurp Out met <strong style="color:#ffd700">${maxWo}</strong> punten!</p><button class="btn btn-orange btn-full" id="wo-finish">Bekijk eindstand</button>`;else content=`<p style="font-size:14px;color:rgba(255,255,255,.5);margin-bottom:1rem">Nog steeds gelijk!</p><button class="btn btn-orange btn-full" id="wo-again">Opnieuw Wurp Out</button>`;}
  return`${backBtn()}<div class="title-bar">WURPEN</div><div class="panel" style="border-color:rgba(255,200,0,.25)"><div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:3px;color:#ffd700;text-align:center;margin-bottom:.5rem">⚡ WURP OUT!</div><p style="font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:1rem">Gelijkspel! Elke speler gooit een beurt.</p><div style="margin-bottom:1rem">${woRows}</div>${content}</div>${scoreHistHTML(tbHistory)}`;}

function tbWinnerHTML(){
  const wi=TB._winnerIdx!==undefined?TB._winnerIdx:0;const w=TB.players[wi],tot=TB.players.length*TB.inzet;
  let uitslag=TB.players.map((p,i)=>{const sl=i===wi&&TB._fromWurpOut?`${TB._woWinnerScore}pt`:`${TB.scores[i]}pt`;return`<div class="final-row ${i===wi?'top':''}"><span>${i===wi?'🏆 ':''}${p} — ${sl}</span><span>${i===wi?`+€${tot-TB.inzet}`:`-€${TB.inzet}`}</span></div>`;}).join('');
  let saldo=TB.players.map((p,i)=>{const s=TB.saldo[i]||0;return`<div class="final-row"><span style="color:rgba(255,255,255,.6)">${p}</span><span style="color:${s>=0?'#ffd700':'#ff6644'};font-weight:700">${s>=0?'+':''}€${s}</span></div>`;}).join('');
  let hist=TB.geschiedenis.map(g=>`<div class="final-row"><span>Spel ${g.spel}</span><span>🏆 ${g.winnaar} · €${g.inzet}</span></div>`).join('');
  return`${backBtn()}<div class="winner-card"><div class="trophy">🏆</div><h2>${w} wint!</h2><p class="sub">${TB._fromWurpOut?'Gewonnen via Wurp Out! · ':''}Pot: €${tot}</p><div class="sect-title">Eindstand</div><div class="final-list">${uitslag}</div><div class="sect-title">De Blockchain</div><div class="final-list">${saldo}</div>${TB.geschiedenis.length>1?`<div class="sect-title">Geschiedenis</div><div class="final-list">${hist}</div>`:''}<div class="btn-row" style="justify-content:center;margin-top:1.5rem"><button class="btn btn-orange" id="volgend-spel">Volgend spel</button><button class="btn btn-blue" id="tb-screenshot">📸 Screenshot</button><button class="btn btn-orange" id="btn-tikkie">Naar Tikkie</button><button class="btn btn-gray" id="back-home">‹ Hoofdmenu</button></div></div>${scoreHistHTML(tbHistory)}`;}

function tbBindEvents(){
  document.getElementById('back-home')?.addEventListener('click',goHome);
  document.getElementById('add-player')?.addEventListener('click',()=>{TB.players.push('');tbRender();});
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{TB.players.splice(+e.currentTarget.dataset.del,1);tbRender();}));
  document.querySelectorAll('[data-idx]').forEach(inp=>inp.addEventListener('input',e=>{TB.players[+e.target.dataset.idx]=e.target.value;const btn=document.getElementById('start-game');if(btn)btn.disabled=TB.players.filter(p=>p.trim()).length<2;}));
  document.getElementById('inzet-row')?.addEventListener('click',e=>{const b=e.target.closest('[data-inzet]');if(!b)return;TB.inzet=+b.dataset.inzet;document.querySelectorAll('#inzet-row [data-inzet]').forEach(btn=>{const sel=+btn.dataset.inzet===TB.inzet;btn.className=`btn ${sel?'btn-orange':'btn-blue'}`;btn.style.flex='1';});});
  document.getElementById('wurp-doel-input')?.addEventListener('input',e=>{const v=parseInt(e.target.value);if(v>=100)TB.wurpDoel=v;});
  document.getElementById('start-game')?.addEventListener('click',()=>{TB.players=TB.players.filter(p=>p.trim());if(TB.players.length<2)return;const d=document.getElementById('wurp-doel-input');if(d){const v=parseInt(d.value);if(v>=100)TB.wurpDoel=v;}if(TB.saldo.length===0)TB.saldo=TB.players.map(()=>0);TB.scores=TB.players.map(()=>0);TB.beurten=TB.players.map(()=>0);TB._winnerIdx=undefined;TB._fromWurpOut=false;TB.screen='game';tbResetTurn();TB.message=`${TB.players[0]}, druk op Wurp nu!`;TB.msgType='info';tbRender();});
  document.getElementById('start-volgend')?.addEventListener('click',()=>{TB.spelNummer++;TB.scores=TB.players.map(()=>0);TB.beurten=TB.players.map(()=>0);TB._winnerIdx=undefined;TB._fromWurpOut=false;TB.screen='game';tbResetTurn();TB.message=`Spel ${TB.spelNummer} — ${TB.players[0]}, druk op Wurp nu!`;TB.msgType='info';tbRender();});
  document.getElementById('roll-btn')?.addEventListener('click',tbDoRoll);
  document.getElementById('zeg-wurp-btn')?.addEventListener('click',()=>{if(TB.zegWurpClicked)return;TB.zegWurpClicked=true;TB.message='📢 ZEG WURP! — druk nu op WURP!';TB.msgType='info';tbRender();});
  document.getElementById('bank-btn')?.addEventListener('click',tbDoBank);
  document.getElementById('close-popup')?.addEventListener('click',()=>{TB.popup=null;tbEndTurn();});
  document.querySelectorAll('[data-raad]').forEach(btn=>btn.addEventListener('click',e=>tbHandleRaad(+e.currentTarget.dataset.raad)));
  document.querySelectorAll('.die.clickable,.die.selected').forEach(d=>{d.addEventListener('click',e=>{if(TB.phase!=='thrown')return;const i=+e.currentTarget.dataset.die;if(TB.diceState[i]==='used')return;const fi=TB.diceState.map((s,j)=>s==='free'||s==='selected'?j:-1).filter(j=>j>=0);if(TB.diceState[i]==='selected')TB.diceState[i]='free';else if(canSelect(i,fi,TB.dice))TB.diceState[i]='selected';else{TB.message='Deze steen scoort niet alleen.';TB.msgType='hint';}tbRender();});});
  document.getElementById('wo-roll-btn')?.addEventListener('click',tbDoWoRoll);
  document.getElementById('wo-bank-btn')?.addEventListener('click',tbDoWoBank);
  document.querySelectorAll('.die-out.clickable-wo,.die-out.selected-wo').forEach(d=>{d.addEventListener('click',e=>{if(TB.woPhase!=='thrown')return;const i=+e.currentTarget.dataset.wodie;const fi=TB.woDiceState.map((s,j)=>s==='free'||s==='selected'?j:-1).filter(j=>j>=0);if(TB.woDiceState[i]==='selected')TB.woDiceState[i]='free';else if(canSelect(i,fi,TB.woDice))TB.woDiceState[i]='selected';else{TB.woMessage='Deze steen scoort niet alleen.';TB.woMsgType='hint';}tbRender();});});
  document.getElementById('wo-finish')?.addEventListener('click',()=>{const maxWo=Math.max(...TB.woPlayers.map(i=>TB.woScores[i]||0));tbHandleWin(TB.woPlayers.find(i=>(TB.woScores[i]||0)===maxWo),true);});
  document.getElementById('wo-again')?.addEventListener('click',()=>{const maxWo=Math.max(...TB.woPlayers.map(i=>TB.woScores[i]||0));tbStartWurpOut(TB.woPlayers.filter(i=>(TB.woScores[i]||0)===maxWo));});
  document.getElementById('volgend-spel')?.addEventListener('click',()=>{TB.screen='inzet';tbRender();});
  document.getElementById('tb-screenshot')?.addEventListener('click',()=>takeScreenshot(tbBlockchainData(),'De Blockchain'));
  document.getElementById('btn-tikkie')?.addEventListener('click',()=>window.open('https://tikkie.me/pay/','_blank'));
}
function tbResetTurn(){TB.dice=[1,1,1,1,1];TB.diceState=['free','free','free','free','free'];TB.turnScore=0;TB.phase='idle';TB.message='';TB.msgType='';TB.zegWurpClicked=false;TB.popup=null;}
function tbDoRoll(){const si=tbSelIdx();const{valid,score,instantWin}=evalSel(si,TB.dice);if(TB.phase==='thrown'&&!valid){TB.message='Selecteer eerst een geldige combinatie!';TB.msgType='warn';tbRender();return;}if(valid){TB.turnScore+=score;si.forEach(i=>TB.diceState[i]='used');if(instantWin){tbOpenRaad(TB.turnScore);return;}}if(TB.diceState.every(s=>s==='used')){TB.diceState=['free','free','free','free','free'];TB.message='Alle stenen scoren! Gooi opnieuw.';TB.msgType='info';}const toRoll=TB.diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);TB.zegWurpClicked=false;TB.phase='thrown';tbRender();const els=document.querySelectorAll('#tray .die');toRoll.forEach(i=>els[i]?.classList.add('rolling'));setTimeout(()=>{toRoll.forEach(i=>TB.dice[i]=Math.ceil(Math.random()*6));document.querySelectorAll('#tray .die.rolling').forEach(el=>el.classList.remove('rolling'));const fi=TB.diceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);let c={};fi.forEach(i=>{const v=TB.dice[i];c[v]=(c[v]||0)+1;});const any=fi.some(i=>{const v=TB.dice[i];return v===1||v===5||(c[v]>=3);});if(!any){TB.turnScore=0;TB.phase='bust';TB.message='Geen punten! Beurt voorbij.';TB.msgType='warn';tbRender();setTimeout(()=>{TB.beurten[TB.currentIdx]++;const mx=Math.max(...TB.scores);const eq=TB.beurten.every(b=>b===TB.beurten[0]);if(mx>=TB.wurpDoel&&eq)tbCheckWinner();else tbNextPlayer();},1400);}else{TB.phase='thrown';TB.message='Klik op dobbelstenen om te selecteren.';TB.msgType='info';tbRender();}},420);}
function tbDoBank(){if(!TB.zegWurpClicked){TB.popup={type:'zegwurp'};TB.turnScore=0;TB.diceState=['free','free','free','free','free'];TB.phase='idle';TB.message='';TB.msgType='';tbRender();return;}const si=tbSelIdx();const{valid,score}=evalSel(si,TB.dice);if(valid)TB.turnScore+=score;if(TB.turnScore===0){tbEndTurn();return;}tbOpenRaad(TB.turnScore);}
function tbOpenRaad(echt){TB.popup={type:'raad',echt,opts:generateRaadOpties(echt)};tbRender();}
function tbHandleRaad(gok){const echt=TB.popup.echt;if(gok===echt){TB.scores[TB.currentIdx]+=echt;tbHistory.push({naam:TB.players[TB.currentIdx],score:echt});TB.popup=null;tbEndTurn();}else if(gok>echt){TB.popup={type:'loser',data:{echt,gok}};tbRender();}else{TB.scores[TB.currentIdx]+=gok;tbHistory.push({naam:TB.players[TB.currentIdx],score:gok});TB.popup={type:'sukkel',data:{gekregen:gok,gemist:echt-gok}};tbRender();}}
function tbEndTurn(){TB.beurten[TB.currentIdx]++;const maxScore=Math.max(...TB.scores);const allEqual=TB.beurten.every(b=>b===TB.beurten[0]);if(maxScore>=TB.wurpDoel&&allEqual)tbCheckWinner();else tbNextPlayer();}
function tbCheckWinner(){const maxScore=Math.max(...TB.scores);const tops=TB.scores.map((s,i)=>s===maxScore?i:-1).filter(i=>i>=0);if(tops.length===1)tbHandleWin(tops[0],false);else tbStartWurpOut(tops);}
function tbStartWurpOut(players){TB.woPlayers=players;TB.woCurrent=0;TB.woScores={};TB.woDice=[1,1,1,1,1];TB.woDiceState=['free','free','free','free','free'];TB.woTurnScore=0;TB.woPhase='idle';TB.woMessage='';TB.woMsgType='';TB.screen='wurpout';tbRender();}
function tbHandleWin(wi,fromWo){const tot=TB.players.length*TB.inzet;TB.players.forEach((_,i)=>{if(i===wi)TB.saldo[i]=(TB.saldo[i]||0)+tot-TB.inzet;else TB.saldo[i]=(TB.saldo[i]||0)-TB.inzet;});TB.geschiedenis.push({spel:TB.spelNummer,winnaar:TB.players[wi],inzet:TB.inzet});TB._winnerIdx=wi;TB._fromWurpOut=fromWo||false;TB._woWinnerScore=fromWo?(TB.woScores[wi]||0):null;TB.screen='winner';tbRender();launchConfetti();}
function tbNextPlayer(){TB.currentIdx=(TB.currentIdx+1)%TB.players.length;tbResetTurn();TB.message=`Wurpbeurt van ${TB.players[TB.currentIdx]}. Druk op Wurp nu!`;TB.msgType='info';tbRender();}
function tbDoWoRoll(){const si=tbWoSelIdx();const{valid,score}=evalSel(si,TB.woDice);if(TB.woPhase==='thrown'&&!valid){TB.woMessage='Selecteer eerst een geldige combinatie!';TB.woMsgType='warn';tbRender();return;}if(valid){TB.woTurnScore+=score;si.forEach(i=>TB.woDiceState[i]='used');}if(TB.woDiceState.every(s=>s==='used')){TB.woDiceState=['free','free','free','free','free'];TB.woMessage='Alle stenen scoren! Gooi opnieuw.';TB.woMsgType='info';}const toRoll=TB.woDiceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);TB.woPhase='thrown';tbRender();const els=document.querySelectorAll('#tray-out .die-out');toRoll.forEach(i=>els[i]?.classList.add('rolling'));setTimeout(()=>{toRoll.forEach(i=>TB.woDice[i]=Math.ceil(Math.random()*6));document.querySelectorAll('#tray-out .die-out.rolling').forEach(el=>el.classList.remove('rolling'));const fi=TB.woDiceState.map((s,i)=>s==='free'?i:-1).filter(i=>i>=0);let c={};fi.forEach(i=>{const v=TB.woDice[i];c[v]=(c[v]||0)+1;});const any=fi.some(i=>{const v=TB.woDice[i];return v===1||v===5||(c[v]>=3);});if(!any){TB.woTurnScore=0;const ci=TB.woPlayers[TB.woCurrent];TB.woScores[ci]=0;TB.woPhase='bust';TB.woMessage='Geen punten! 0 punten.';TB.woMsgType='warn';tbRender();setTimeout(()=>tbNextWoPlayer(),1400);}else{TB.woPhase='thrown';TB.woMessage='Selecteer stenen of druk WURP!';TB.woMsgType='info';tbRender();}},420);}
function tbDoWoBank(){const si=tbWoSelIdx();const{valid,score}=evalSel(si,TB.woDice);if(valid)TB.woTurnScore+=score;TB.woScores[TB.woPlayers[TB.woCurrent]]=TB.woTurnScore;tbNextWoPlayer();}
function tbNextWoPlayer(){TB.woCurrent++;if(TB.woCurrent<TB.woPlayers.length){TB.woDice=[1,1,1,1,1];TB.woDiceState=['free','free','free','free','free'];TB.woTurnScore=0;TB.woPhase='idle';TB.woMessage='';TB.woMsgType='';}tbRender();}

render();
</script>
</body>
</html>
